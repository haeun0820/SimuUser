spring.application.name=simuuser
server.port=${PORT:8080}

# 로컬 테스트용 MySQL 데이터베이스 연결 정보
spring.datasource.url=jdbc:mysql://localhost:3306/simuuser_db
spring.datasource.username=simuuser
spring.datasource.password=simuuser2026!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Facebook OAuth2 login
# Facebook Developer Console에 등록한 값으로 환경변수를 설정하세요.
# Redirect URI: http://localhost:8080/login/oauth2/code/facebook
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email

# Google OAuth2 login
# Google Cloud Console에 등록한 값으로 환경변수를 설정하세요.
# Redirect URI:
# - http://localhost:8080/login/oauth2/code/google
# - https://simuuser.onrender.com/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
