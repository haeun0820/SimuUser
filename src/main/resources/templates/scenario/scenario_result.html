<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
  <title>SimuUser</title>
  <link rel="stylesheet" th:href="@{/css/scenario/scenario_result.css}">
  <link rel="stylesheet" th:href="@{/css/header/header.css}">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root" data-active="scenario"></div>

  <div class="main-area">
    <header th:replace="~{header/header :: header(${ {'분석도구','시나리오 비교'} })}"></header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M3 3v18h18M7 16l4-4 4 4 5-8" />
          </svg>
        </div>
        <div>
          <div class="page-title">시나리오 비교</div>
          <div class="page-subtitle">여러 기획안을 비교해서 더 적합한 방향을 정리합니다.</div>
        </div>
      </div>

      <div class="result-action-group">
        <button type="button" class="btn-action-outline" onclick="history.back()">이전으로 돌아가기</button>
        <button type="button" class="btn-action-primary" id="btnRerunScenario">다시 분석</button>
        <button type="button" class="btn-action-success" id="btnSaveScenarioResult">저장하기</button>
      </div>

      <div class="best-recommend-card">
        <div class="recommend-icon">AI</div>
        <div class="recommend-label" id="recommendLabel">AI 추천 최적안</div>
        <div class="recommend-title" id="recommendTitle">-</div>
        <p class="recommend-desc" id="recommendReason">분석 결과를 불러오는 중입니다.</p>
      </div>

      <div class="scenario-summary-grid" id="scenarioSummaryGrid"></div>

      <div class="detail-analysis-card">
        <h3 class="section-title">항목별 비교 분석</h3>
        <table class="analysis-table">
          <thead id="criteriaTableHead"></thead>
          <tbody id="criteriaTableBody"></tbody>
        </table>
      </div>

      <div class="final-suggestion-grid">
        <div class="suggestion-box">
          <h4>최종 추천</h4>
          <p id="finalSuggestionText">-</p>
        </div>
        <div class="suggestion-box hybrid">
          <h4>하이브리드 제안</h4>
          <p id="hybridSuggestionText">-</p>
        </div>
      </div>
    </main>
  </div>
</div>

<script th:inline="javascript">
  window.scenarioAnalysisContext = {
    request: /*[[${scenarioRequestData}]]*/ {},
    result: /*[[${scenarioResultData}]]*/ {}
  };
</script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/header.js}"></script>
<script th:src="@{/js/scenario/scenario_result.js}"></script>
</body>
</html>
