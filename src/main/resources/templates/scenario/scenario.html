<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
  <title>SimuUser</title>
  <link rel="stylesheet" th:href="@{/css/scenario/scenario.css}">
  <link rel="stylesheet" th:href="@{/css/header/header.css}">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root" data-active="scenario"></div>

  <div class="main-area">
    <header th:replace="~{header/header :: header(${ {'분석도구','시나리오 비교'} })}"></header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M3 3v18h18M7 16l4-4 4 4 5-8" />
          </svg>
        </div>
        <div>
          <div class="page-title">시나리오 비교</div>
          <div class="page-subtitle">여러 기획안을 비교해서 더 적합한 방향을 빠르게 고릅니다.</div>
        </div>
      </div>

      <div class="project-select-card">
        <div class="project-select-header">
          <span class="section-title" style="margin-bottom:0;">프로젝트 선택</span>
          <div class="project-filter-tabs">
            <label><input type="radio" name="projectFilter" value="all" checked><span class="radio-dot"></span><span>전체</span></label>
            <label><input type="radio" name="projectFilter" value="collab"><span class="radio-dot"></span><span>협업</span></label>
            <label><input type="radio" name="projectFilter" value="personal"><span class="radio-dot"></span><span>개인</span></label>
            <button type="button" class="btn-new-proj" id="btnNewProject" th:data-href="@{/project/new}">새로 만들기 +</button>
          </div>
        </div>
        <div class="project-list-scroll" id="projectListScroll"></div>
      </div>

      <div class="compare-config-bar">
        <div class="config-item flex-grow">
          <label>비교 제목</label>
          <input type="text" id="compareTitle" class="form-input" placeholder="저장될 비교 제목을 입력해주세요.">
        </div>
        <div class="config-item">
          <label>시나리오 개수</label>
          <select id="scenarioCount" class="form-select">
            <option value="2">2개</option>
            <option value="3">3개</option>
            <option value="4">4개</option>
          </select>
        </div>
      </div>

      <div id="scenarioContainer" class="scenario-grid grid-2"></div>

      <form id="compareForm" th:action="@{/scenario/result}" method="post">
        <input type="hidden" name="_csrf" th:if="${_csrf}" th:value="${_csrf.token}">
        <input type="hidden" name="projectId" id="selectedProjectIdInput">
        <input type="hidden" name="scenarioPayload" id="scenarioPayloadInput">
        <input type="hidden" name="compareTitle" id="compareTitleHiddenInput">
        <div class="action-footer">
          <button type="submit" class="btn-run-compare" id="btnRunCompare">시나리오 비교 실행</button>
        </div>
      </form>
    </main>
  </div>
</div>

<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/header.js}"></script>
<script th:src="@{/js/scenario/scenario.js}"></script>
</body>
</html>
