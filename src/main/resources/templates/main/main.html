<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SimuUser</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" th:href="@{/css/main/main.css}">
</head>
<body>

<header>
    <div class="logo">SimuUser</div>

    <nav>
        <a href="#">기능</a>
        <a href="#">사용 흐름</a>
    </nav>

    <div class="login-btn">로그인</div>
</header>

<section class="hero">
    <h1>
        아이디어를 검증하고<br>
        사업성을 판단하세요
    </h1>

    <p>
        AI 유저 시뮬레이션, 시장 분석, 수익성 분석까지 자동화
    </p>

    <div class="summary">
        <div class="summary-box">6가지<br>AI 분석</div>
        <div class="summary-box">100%<br>자동화</div>
        <div class="summary-box">수분<br>소요</div>
        <div class="summary-box">무료<br>시작</div>
    </div>

    <div class="center-btn">
        <div class="btn">핵심 기능</div>
    </div>
</section>

<section class="section">
    <div class="section-title">
        <h2>핵심 기능</h2>
    </div>

    <div class="card-grid">
        <div class="card">AI 가상 유저 시뮬레이션</div>
        <div class="card">시장 & 경쟁 분석</div>
        <div class="card">비용 & 수익성 분석</div>
        <div class="card">기획 피드백 AI</div>
        <div class="card">자동 문서화</div>
        <div class="card">시나리오 비교</div>
    </div>

    <div class="center-btn">
        <div class="btn">사용 흐름</div>
    </div>
</section>

<section class="section">
    <div class="section-title">
        <h2>사용 흐름</h2>
    </div>

    <div class="flow">
        <div class="flow-card"><span class="step">01</span> 아이디어 입력</div>
        <div class="flow-card"><span class="step">02</span> AI 시뮬레이션</div>
        <div class="flow-card"><span class="step">03</span> 시장 분석</div>
        <div class="flow-card"><span class="step">04</span> 수익성 분석</div>
        <div class="flow-card"><span class="step">05</span> 기획 피드백</div>
        <div class="flow-card"><span class="step">06</span> 문서화</div>
    </div>
</section>

</body>
</html>
