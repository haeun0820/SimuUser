<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>SimuUser</title>
  <link rel="stylesheet" th:href="@{/css/project/exact_project.css}">
  
</head>
<body>
<div class="app-layout">

  <div id="sidebar-root" data-active="all-projects"></div>

  <div class="main-area">

    <header class="top-header">
        <nav class="breadcrumb-nav">
            <a th:href="@{/project/all}">프로젝트</a>
            <span class="bc-sep">›</span>
            <span class="bc-current">로딩 중...</span>
        </nav>
      <div class="header-icons auth-actions">
      <button class="icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zM18 16v-5c0-3.07-1.63-5.64-4.5-6.32V4a1.5 1.5 0 0 0-3 0v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="#6b7280"/>
        </svg>
      </button>
      <div class="profile-menu">
        <button class="icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="#6b7280" stroke-width="1.8"/>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="#6b7280" stroke-width="1.8"/>
          </svg>
        </button>
        <div class="dropdown">
          <form class="logout-form" th:action="@{/mypage}" method="get">
            <button class="logout-button" type="submit">마이페이지</button>
          </form>
          <form class="logout-form" th:action="@{/logout}" method="post">
            <button class="logout-button" type="submit">로그아웃</button>
          </form>
        </div>
      </div>
    </div>
    </header>

    <main class="page-content">
        <div class="card project-summary-card">
        <div class="summary-header">
            <div class="summary-title-area">
                <h2 class="page-title">프로젝트 제목</h2>
                <span class="project-type-badge badge-collab">협업</span>
                <span class="collab-members">With. 최연주, 이하은</span>
            </div>
            <button type="button" class="btn-add" onclick="openShareModal()" style="padding: 8px 16px;">협업 공유</button>
        </div>
        
        <div class="summary-meta">
            <span class="project-time">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 15"></polyline>
                </svg>
                방금 전
            </span>
        </div>

        <div class="summary-body">
            <p class="project-description">설명을 불러오는 중입니다...</p>
            <button class="btn-view-more hidden">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                자세히 보기
            </button>
        </div>
    </div>

    <section class="analysis-section">
        <div class="section-header">
            <h3 class="section-title">분석 기록 & 문서</h3>
            <button class="tab-add-btn">탭 추가 +</button>
        </div>

        <div class="mypage-tabs analysis-toolbar-tabs">
            <button class="tab-btn active" data-target="tab-user-simu">AI 유저 시뮬레이션</button>
            <button class="tab-btn" data-target="tab-market">시장&경쟁 분석</button>
            <button class="tab-btn" data-target="tab-finance">비용&수익성 분석</button>
            <button class="tab-btn" data-target="tab-plan">기획&피드백 AI</button>
            <button class="tab-btn" data-target="tab-scenario">시나리오 비교</button>
            <button class="tab-btn" data-target="tab-document">자동 문서화</button>
        </div>

        <div class="toolbar-bottom" style="margin-top: 20px;">
            <div class="sort-options">
                <label class="radio-label">
                    <input type="radio" name="sort" checked>
                    <span class="radio-dot"></span> 최신순
                </label>
                <label class="radio-label">
                    <input type="radio" name="sort">
                    <span class="radio-dot"></span> 즐겨찾기순
                </label>
            </div>
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="analysisSearchInput" placeholder="검색...">
            </div>
        </div>

        <!-- AI 유저 시뮬레이션 탭 -->
        <div id="tab-user-simu" class="tab-content active">
            <div class="analysis-list" id="simuAnalysisList">
                <div class="analysis-item">
                    <div class="item-status success">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="item-info">
                        <span class="item-title">AI 시뮬레이션 - 기본 세션</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit-small">편집</button>
                        <button class="btn-icon-only btn-star" onclick="toggleStar(this)">
                            <svg class="star-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </button>
                        <button class="btn-icon-only danger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 시장&경쟁 분석 탭 -->
        <div id="tab-market" class="tab-content">
            <div class="analysis-list" id="marketAnalysisList">
                <!-- JS로 렌더링 -->
            </div>
        </div>

        <div id="tab-finance" class="tab-content">
            <div class="analysis-list" id="financeAnalysisList"></div>
        </div>
      
        <div id="tab-plan" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                기획 피드백 기록이 없습니다.
            </div>
        </div>
        <div id="tab-scenario" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                시나리오 비교 기록이 없습니다.
            </div>
        </div>
        <div id="tab-document" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                자동 문서화 기록이 없습니다.
            </div>
        </div>

        <div class="analysis-footer" style="text-align: center;">
            <button class="btn-primary" id="btnAnalyze" style="border-radius: 30px; margin-top: 30px; padding: 12px 40px; font-size: 16px;">분석하기</button>
        </div>
    </section>
    </main>
  </div>
</div>

<script th:src="@{/js/sidebar.js}"></script>

<!-- 협업 공유 모달 -->
<div id="shareModal" class="popup-overlay hidden">
    <div class="popup share-popup" style="max-height: 80vh; display: flex; flex-direction: column;">
        <div class="popup-header">
            <h3 class="share-title">"<span id="modalProjectTitle">프로젝트 제목</span>" 공유</h3>
        </div>
        
        <div class="share-section" style="flex-shrink: 0;">
            <label class="share-label">사용자 추가</label>
            <div class="share-input-row" style="display: flex; gap: 8px;">
                <input type="text" id="shareEmailInput" placeholder="이메일 입력 후 엔터..." class="form-input"
                       style="flex: 1;" onkeydown="handleShareEmailKeydown(event)">
                <select id="shareRoleSelect" class="role-select-custom">
                    <option value="편집자">편집자</option>
                    <option value="뷰어">뷰어</option>
                    <option value="관리자">관리자</option>
                </select>
            </div>
        </div>

        <div class="share-section" style="flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0;">
            <label class="share-label">사용자</label>
            <div class="member-scroll-list" id="modalMemberList" 
                 style="flex: 1; overflow-y: auto; padding-right: 4px; margin-top: 8px;">
                </div>
        </div>

        <div class="form-actions" style="margin-top: 24px; flex-shrink: 0;">
            <button class="btn-primary" onclick="submitShareInvites()" style="min-width: 100px; padding: 10px;">확인</button>
            <button class="btn-cancel" onclick="closeShareModal()" style="min-width: 100px; padding: 10px;">취소</button>
        </div>
    </div>
</div>

<!-- 탭 추가 모달 -->
<div id="addTabModal" class="popup-overlay hidden">
    <div class="popup add-tab-popup">
        <div class="popup-header">
            <h2 class="popup-title" style="font-size: 24px; font-weight: 800;">탭 추가</h2>
        </div>
        <div class="form-section" style="margin-top: 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="font-size: 18px; font-weight: 700; white-space: nowrap;">탭 이름</label>
                <input type="text" id="newTabName" placeholder="탭 이름을 입력하세요" class="form-input"
                       style="background: #f8fafc; border: 1px solid #e2e8f0; height: 45px;">
            </div>
        </div>
        <div class="form-actions" style="margin-top: 30px; gap: 15px;">
            <button class="btn-cancel" onclick="closeTabModal()" style="flex: 1; height: 50px; background: #eee; font-size: 18px;">취소</button>
            <button class="btn-primary" onclick="createTab()" style="flex: 1; height: 50px; background: #dbeafe; color: #2563eb; font-size: 18px;">추가</button>
        </div>
    </div>
</div>

<div id="createDocModal" class="popup-overlay hidden">
    <div class="popup add-tab-popup">
        <div class="popup-header">
            <h2 class="popup-title" style="font-size: 24px; font-weight: 800;">새 문서 만들기</h2>
        </div>
        <div class="form-section" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-size: 16px; font-weight: 700;">문서 제목</label>
                <input type="text" id="newDocTitle" placeholder="제목을 입력하세요" class="form-input"
                       style="background: #f8fafc; border: 1px solid #e2e8f0; height: 45px; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-size: 16px; font-weight: 700;">설명 (선택)</label>
                <textarea id="newDocDesc" placeholder="문서에 대한 간단한 설명을 입력하세요" class="form-input"
                          style="background: #f8fafc; border: 1px solid #e2e8f0; height: 100px; width: 100%; padding: 12px; resize: none;"></textarea>
            </div>
        </div>
        <div class="form-actions" style="margin-top: 30px; gap: 15px;">
            <button class="btn-cancel" onclick="closeDocModal()" style="flex: 1; height: 50px; background: #eee; font-size: 18px; border-radius: 12px;">취소</button>
            <button class="btn-primary" onclick="submitCreateDocument()" style="flex: 1; height: 50px; background: #dbeafe; color: #2563eb; font-size: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer;">생성하기</button>
        </div>
    </div>
</div>

<script>
  /* ============================================================
     exact_project.js (inline) – 프로젝트 상세 페이지
     ============================================================ */

  let currentProject = null;
  let currentTabId = 'tab-user-simu';
  let shareMembers = [];
  let stagedInvites = [];

  function setAnalysisListsLoading() {
    const loadingHtml = '<div class="empty-state" style="padding:40px;text-align:center;color:#94a3b8;">분석 목록을 불러오는 중입니다.</div>';
    const simuList = document.getElementById('simuAnalysisList');
    const marketList = document.getElementById('marketAnalysisList');
    const costList = document.getElementById('financeAnalysisList');

    if (simuList) simuList.innerHTML = loadingHtml;
    if (marketList) marketList.innerHTML = loadingHtml;
    if (costList) costList.innerHTML = loadingHtml;
  }

/* ── 전역 변수 및 토큰 준비 ── */
const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

/* --- 스크립트 상단에 배치 --- */

// 1. DB에서 저장된 모든 탭 불러오기
async function loadSavedTabs(projectId) {
    try {
        const response = await fetch(`/api/projects/${projectId}/tabs`);
        if (!response.ok) return;
        const tabs = await response.json();
        tabs.forEach(tab => renderTabUI(tab)); 
    } catch (e) { 
        console.error("탭 불러오기 실패", e); 
    }
}

// 2. 탭 UI를 화면에 그리고 이벤트를 연결하는 함수
function renderTabUI(tab) {
    const tabId = "tab-" + tab.id;
    const realDbId = tab.id; 
    const tabContainer = document.querySelector('.analysis-toolbar-tabs');
    
    if (document.getElementById(tabId)) return;

    const newBtn = document.createElement('button');
    newBtn.className = 'tab-btn custom-tab';
    newBtn.setAttribute('data-target', tabId);
    newBtn.setAttribute('data-db-id', realDbId); 
    newBtn.textContent = tab.name;

    // [이벤트 연결] 더블클릭 - 이름 수정
    newBtn.ondblclick = (e) => {
        e.stopPropagation();
        const oldName = newBtn.textContent;
        const newName = prompt("수정할 탭 이름을 입력하세요", oldName);
        if (newName && newName !== oldName) {
            updateTabInDb(realDbId, newName, newBtn);
        }
    };

    // [이벤트 연결] 우클릭 - 삭제
    newBtn.oncontextmenu = (e) => {
        e.preventDefault(); 
        if (confirm(`'${newBtn.textContent}' 탭과 내부 문서를 모두 삭제하시겠습니까?`)) {
            deleteTabFromDb(realDbId, tabId, newBtn);
        }
    };

    tabContainer.appendChild(newBtn);

    // 탭 컨텐츠 생성
    const analysisSection = document.querySelector('.analysis-section');
    const footer = document.querySelector('.analysis-footer');
    const newContent = document.createElement('div');
    newContent.id = tabId;
    newContent.className = 'tab-content';
    newContent.innerHTML = `
        <div style="padding: 60px 40px; text-align: center; border: 2px dashed #f1f5f9; border-radius: 16px; margin: 20px 0;">
            <p style="color:#94a3b8; margin-bottom: 16px; font-size: 15px;">
                "${tab.name}" 관련 문서가 아직 없습니다.
            </p>
            <button class="btn-primary" onclick="createDocument('${tabId}')">
                새로 만들기 +
            </button>
        </div>`;
    analysisSection.insertBefore(newContent, footer);
}

// 3. 서버에 탭 이름 수정 요청
async function updateTabInDb(dbId, newName, btnElement) {
    try {
        const response = await fetch(`/api/projects/tabs/${dbId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', [header]: token },
            body: JSON.stringify({ name: newName })
        });
        if (response.ok) {
            btnElement.textContent = newName;
            // 내용 영역의 텍스트도 업데이트
            const contentArea = document.getElementById("tab-" + dbId);
            if(contentArea) contentArea.querySelector('p').textContent = `"${newName}" 관련 문서가 아직 없습니다.`;
        }
    } catch (err) { alert("수정 실패: 서버 오류"); }
}

// 4. 서버에 탭 삭제 요청
async function deleteTabFromDb(dbId, htmlId, btnElement) {
    try {
        const response = await fetch(`/api/projects/tabs/${dbId}`, {
            method: 'DELETE',
            headers: { [header]: token }
        });
        if (response.ok) {
            btnElement.remove(); 
            const contentArea = document.getElementById(htmlId);
            if(contentArea) contentArea.remove();
            
            // 첫 번째 탭(기본탭)으로 이동
            const firstTab = document.querySelector('.tab-btn');
            if (firstTab) switchTab(firstTab);
        }
    } catch (err) { alert("삭제 실패: 서버 오류"); }
}

// 5. 새 탭 생성 버튼 클릭 시 실행
async function createTab() {
    const input = document.getElementById('newTabName');
    const tabName = input.value.trim();
    if (!tabName) { alert("탭 이름을 입력해주세요."); return; }

    const projectId = window.location.pathname.split('/').pop();

    try {
        const response = await fetch(`/api/projects/${projectId}/tabs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', [header]: token },
            body: JSON.stringify({
                name: tabName,
                orderIndex: document.querySelectorAll('.tab-btn').length
            })
        });

        if (!response.ok) throw new Error("저장 실패");

        const savedTab = await response.json();
        renderTabUI(savedTab); 
        switchTab(document.querySelector(`[data-target="tab-${savedTab.id}"]`));
        closeTabModal();
    } catch (error) {
        alert("탭 저장 중 오류가 발생했습니다.");
    }
}

  /* ── [1] 프로젝트 상세 데이터 로드 ── */
  async function loadProjectDetail() {
    const pathSegments = window.location.pathname.split('/');
    const projectId = pathSegments[pathSegments.length - 1];
    setAnalysisListsLoading();
    currentProject = null;

    if (!projectId || projectId === 'detail') {
      alert("잘못된 접근입니다.");
      location.href = "/project/all";
      return;
    }

    try {
      const response = await fetch('/api/projects', {
        headers: { Accept: 'application/json' }
      });
      if (response.ok) {
        const projects = await response.json();
        currentProject = projects.find(p => String(p.id) === projectId) || null;
      }
    } catch (error) {
      console.error(error);
    }

    if (currentProject) {
      const descElem = document.querySelector('.project-description');
      const viewMoreBtn = document.querySelector('.btn-view-more');

      document.querySelector('.bc-current').textContent = currentProject.title;
      document.querySelector('.page-title').textContent = currentProject.title;
      descElem.textContent = currentProject.description || '설명이 없습니다.';

      setTimeout(() => {
        const lineHeight = parseFloat(window.getComputedStyle(descElem).lineHeight);
        const scrollHeight = descElem.scrollHeight;
        const maxHeight = lineHeight * 3.1;

        if (scrollHeight <= maxHeight) {
          if (viewMoreBtn) viewMoreBtn.classList.add('hidden');
          descElem.classList.add('expanded');
        } else {
          if (viewMoreBtn) viewMoreBtn.classList.remove('hidden');
        }
      }, 100);

      if (viewMoreBtn) {
        viewMoreBtn.onclick = function () {
          const isExpanded = descElem.classList.contains('expanded');
          if (isExpanded) {
            descElem.classList.remove('expanded');
            this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg> 자세히 보기`;
          } else {
            descElem.classList.add('expanded');
            this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg> 설명 접기`;
          }
        };
      }

      const collabBadge = document.querySelector('.badge-collab');
      const collabText = document.querySelector('.collab-members');
      const shareButton = document.querySelector('.btn-add');
      if (currentProject.type === 'collab') {
        if (collabBadge) collabBadge.style.display = 'inline-block';
        if (collabText) collabText.textContent = `With. ${currentProject.members ? currentProject.members.join(', ') : ''}`;
        if (shareButton) shareButton.style.display = 'inline-block';
      } else {
        if (collabBadge) collabBadge.style.display = 'none';
        if (collabText) collabText.style.display = 'none';
        if (shareButton) shareButton.style.display = 'none';
      }

      await loadMarketAnalyses(projectId);
      await loadCostAnalyses(projectId);
      await loadAiUserAnalyses(projectId);
      renderAiUserAnalysisList();
      renderMarketAnalysisList();
      renderCostAnalysisList();
    }
  }

  async function loadAiUserAnalyses(projectId) {
    if (!currentProject) return;
    currentProject.aiUserAnalyses = [];

    try {
      const response = await fetch(`/aiuser/results/project/${projectId}`, {
        headers: { Accept: 'application/json' }
      });
      if (!response.ok) return;

      const analyses = await response.json();
      currentProject.aiUserAnalyses = analyses.map(item => ({
        id: String(item.id),
        type: 'aiuser',
        title: 'AI 유저 시뮬레이션',
        createdAt: item.createdAt,
        result: item.result,
        starred: false
      }));
    } catch (error) {
      console.error(error);
    }
  }

  async function loadMarketAnalyses(projectId) {
    if (!currentProject) return;
    currentProject.marketAnalyses = [];

    try {
      const response = await fetch(`/market/results/project/${projectId}`, {
        headers: { Accept: 'application/json' }
      });
      if (!response.ok) return;

      const analyses = await response.json();
      currentProject.marketAnalyses = analyses.map(item => ({
        id: String(item.id),
        type: 'market',
        title: item.title || '시장 & 경쟁 분석',
        createdAt: item.createdAt,
        result: item.result,
        starred: false
      }));
    } catch (error) {
      console.error(error);
    }
  }

function escHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
}

function memberAvatar(member) {
    if (member.profileImage) {
        return `<img src="${escHtml(member.profileImage)}" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">`;
    }
    const initial = (member.name || member.email || '?').charAt(0).toUpperCase();
    return `<span>${escHtml(initial)}</span>`;
}

function roleLabel(role) {
    if (role === 'OWNER') return '소유자';
    if (role === 'MEMBER') return '팀원';
    return role || '편집자';
}

function statusLabel(status) {
    if (status === 'ACCEPTED') return '참여중';
    if (status === 'PENDING') return '요청 대기';
    if (status === 'DECLINED') return '거절됨';
    return status || '';
}

async function stageShareInvite() {
    const emailInput = document.getElementById('shareEmailInput');
    const roleSelect = document.getElementById('shareRoleSelect');
    const email = emailInput.value.trim();
    const role = roleSelect.value;

    if (!email) return;
    if (!email.includes('@')) return alert("이메일 형식이 아닙니다.");

    const alreadyMember = shareMembers.some(member => member.email === email && member.status === 'ACCEPTED');
    if (alreadyMember) {
        alert("이미 프로젝트 팀원입니다.");
        return;
    }

    const alreadyPending = shareMembers.some(member => member.email === email && member.status === 'PENDING')
        || stagedInvites.some(invite => invite.email === email);
    if (alreadyPending) {
        alert("이미 보낸 요청입니다.");
        return;
    }

    let name = email.split('@')[0];
    try {
        const response = await fetch(`/api/users/search?email=${encodeURIComponent(email)}`, {
            headers: { Accept: 'application/json' }
        });
        if (response.ok) {
            const users = await response.json();
            const matched = users.find(user => user.email === email) || users[0];
            if (matched?.name) name = matched.name;
        }
    } catch (error) {
        console.error(error);
    }

    stagedInvites.push({ email, role, name });
    emailInput.value = '';
    renderModalMembers();
}

function removeStagedInvite(index) {
    stagedInvites.splice(index, 1);
    renderModalMembers();
}

    try {

}

async function submitShareInvites() {
    if (!stagedInvites.length) {
        closeShareModal();
        return;
    }
    if (!currentProject?.id) return alert("프로젝트 정보를 불러온 뒤 다시 시도해주세요.");

    for (const invite of stagedInvites) {
        const response = await fetch(`/api/projects/${currentProject.id}/members/invite`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [header]: token
            },
            body: JSON.stringify(invite)
        });

        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            alert(error.message || "초대 요청 전송에 실패했습니다.");
            return;
        }
    }

    stagedInvites = [];
    await loadShareMembers();
    renderModalMembers();
    alert("팀 멤버 초대 요청을 보냈습니다.");
    closeShareModal();
}

  function updateLocalStorage() {
    if (!currentProject) return;
    
    const allProjects = JSON.parse(localStorage.getItem('simu_projects') || '[]');
    const pIdx = allProjects.findIndex(p => String(p.id) === String(currentProject.id));
    
    if (pIdx !== -1) {
        // 현재 메모리에 있는 최신 상태(members 포함)를 저장소에 반영
        allProjects[pIdx] = { ...currentProject }; 
        localStorage.setItem('simu_projects', JSON.stringify(allProjects));
        console.log("저장 완료:", allProjects[pIdx].members);
    }
}

  /* ── [6] 모달 제어 ── */
  const shareModal = document.getElementById('shareModal');
  const addTabModal = document.getElementById('addTabModal');

  async function openShareModal() {
    if (!shareModal) return;

    }

      alert("협업 프로젝트에서만 팀원을 추가할 수 있습니다.");

      document.getElementById('modalProjectTitle').textContent = currentProject.title;
    }

  function closeShareModal() {
    stagedInvites = [];
    document.getElementById('shareEmailInput').value = '';
    if (shareModal) shareModal.classList.add('hidden');
  }

  window.openShareModal = openShareModal;

  // 기존 toggleStar 함수 수정
function toggleStar(btn) {
    // active 클래스를 토글 (CSS에서 이 클래스를 기준으로 색상을 바꿈)
    btn.classList.toggle('active');
    
    // SVG 속성을 직접 건드리고 싶다면 아래 코드 추가 (CSS만으로 안 될 때)
    const icon = btn.querySelector('.star-icon');
    if (btn.classList.contains('active')) {
        icon.setAttribute('fill', '#f59e0b');
        icon.setAttribute('stroke', '#f59e0b');
    } else {
        icon.setAttribute('fill', 'none');
        icon.setAttribute('stroke', 'currentColor');
    }
}

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Date.now() - new Date(isoStr).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return `${min}분 전`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}시간 전`;
    return `${Math.floor(hr / 24)}일 전`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── [새 문서 생성 모달 제어] ── */
let targetTabIdForDoc = ''; // 어느 탭에서 문서를 만드는지 저장

function createDocument(tabId) {
    targetTabIdForDoc = tabId;
    const modal = document.getElementById('createDocModal');
    const titleInput = document.getElementById('newDocTitle');
    const descInput = document.getElementById('newDocDesc');
    
    // 초기화

    descInput.value = '';
    
    modal.classList.remove('hidden');
    setTimeout(() => titleInput.focus(), 100);
}

function closeDocModal() {
    document.getElementById('createDocModal').classList.add('hidden');
}

/* ── [수정본] 특정 탭의 문서 목록을 가져와 렌더링 ── */
async function renderCustomDocuments(tabId) {
    const tabContent = document.getElementById(tabId);
    if (!tabContent) return;

    const realTabDbId = tabId.replace("tab-", "");

    try {
        const response = await fetch(`/api/tabs/${realTabDbId}/documents`);
        if (!response.ok) throw new Error("문서 목록 조회 실패");
        
        const documents = await response.json();

        if (documents.length > 0) {
            tabContent.innerHTML = `
                <div class="analysis-list">
                    ${documents.map(doc => `
                        <div class="analysis-item">
                            <div class="item-status success" style="background: #3b82f6;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                </svg>
                            </div>
                            <div class="item-info">
                                <span class="item-title">${escHtml(doc.title)}</span>
                                <span class="item-date" style="font-size:12px; color:#94a3b8; margin-left:10px;">${timeAgo(doc.updatedAt || doc.createdAt)}</span>
                            </div>
                            <div class="item-actions">
                                <button class="btn-edit-small" onclick="window.open('/document/editor?id=${doc.id}', '_blank')">열기</button>
                                <button class="btn-edit-small" style="background:#f1f5f9; color:#475569; border:1px solid #e2e8f0;" onclick="downloadDocumentFromServer('${doc.id}')">다운로드</button>
                                <button class="btn-icon-only danger" onclick="deleteDocumentFromServer('${doc.id}', '${tabId}')">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>`).join('')}
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn-primary" style="background: #f1f5f9; color: #2563eb; border: 1px dashed #cbd5e1; width: 100%; padding: 12px;" onclick="createDocument('${tabId}')">
                        + 새 문서 추가하기
                    </button>
                </div>`;
        } else {
            // 문서가 없을 때 코드 (기존 유지)
            tabContent.innerHTML = `<div style="padding: 60px 40px; text-align: center; border: 2px dashed #f1f5f9; border-radius: 16px; margin: 20px 0;">
                <p style="color:#94a3b8; margin-bottom: 16px; font-size: 15px;">문서가 아직 없습니다.</p>
                <button class="btn-primary" onclick="createDocument('${tabId}')">새로 만들기 +</button>
            </div>`;
        }
    } catch (err) {
        console.error(err);
    }
}

/* ── [추가] 서버 연동 삭제 함수 ── */
async function deleteDocumentFromServer(docId, tabId) {
    if (!confirm("이 문서를 정말 삭제하시겠습니까?")) return;

    // 토큰과 헤더 가져오기 (매우 중요!)
    const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
    const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

    try {
        const response = await fetch(`/api/documents/${docId}`, {
            method: 'DELETE',
            headers: {
                [header]: token // 보안 토큰 동봉
            }
        });

        if (response.ok) {
            alert("삭제되었습니다.");
            // 현재 탭의 목록을 다시 그려서 삭제된 내용을 반영
            renderCustomDocuments(tabId); 
        } else {
            const errorMsg = await response.text();
            alert("삭제 실패: " + errorMsg);
        }
    } catch (err) {
        console.error("삭제 요청 중 오류 발생:", err);
    }
}

// 목록에서 클릭 시 에디터를 새 창으로 여는 헬퍼 함수
function openEditor(docId) {
    const doc = currentProject.documents.find(d => d.id === docId);
    if (doc) {
        localStorage.setItem('currentEditDoc', JSON.stringify(doc));
        window.open(`/document/editor?id=${docId}`, '_blank');
    }
}

async function submitCreateDocument() {
    const title = document.getElementById('newDocTitle').value.trim();
    const description = document.getElementById('newDocDesc').value.trim();

    if (!title) { alert("문서 제목을 입력해주세요."); return; }

    // CSRF 토큰 (이미 스크립트 상단에 정의되어 있어야 함)
    const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    // 현재 탭의 DB ID 가져오기 (문자열 "tab-123"에서 숫자만 추출)
    const tabDbId = targetTabIdForDoc.replace("tab-", "");

    try {
        const response = await fetch(`/api/tabs/${tabDbId}/documents`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                [header]: token 
            },
            body: JSON.stringify({ title, description })
        });

        if (response.ok) {
            const data = await response.json(); // 백엔드에서 준 { "id": 5 } 형태
            
            // 새 창으로 에디터 열기 (생성된 DB ID 사용)
            window.open(`/document/editor?id=${data.id}`, '_blank');
            
            closeDocModal();
            // 목록 새로고침
            renderCustomDocuments(targetTabIdForDoc); 
        }
    } catch (error) {
        alert("문서 생성 중 오류가 발생했습니다.");
    }
}

/* ── [추가된 함수: 문서 다운로드 (텍스트 파일 방식)] ── */
function downloadDocument(docId) {
    const doc = currentProject.documents.find(d => d.id === docId);
    if (!doc) return;

    // 문서의 HTML 콘텐츠에서 태그를 제거하고 텍스트만 추출하거나 HTML 그대로 저장
    const content = doc.content || "내용이 없습니다.";
    const blob = new Blob([content], { type: 'text/html' });
    const url = window.URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = `${doc.title}.html`; // HTML 파일로 다운로드
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
}
