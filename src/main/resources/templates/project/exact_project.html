<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimuUser</title>
  <link rel="stylesheet" th:href="@{/css/project/exact_project.css}">
</head>
<body>
<div class="app-layout">

  <div id="sidebar-root" data-active="all-projects"></div>

  <div class="main-area">

    <header class="top-header">
        <nav class="breadcrumb-nav">
            <a th:href="@{/project/all}">프로젝트</a>
            <span class="bc-sep">›</span>
            <span class="bc-current">로딩 중...</span>
        </nav>
      <div class="header-icons auth-actions">

      <button class="icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zM18 16v-5c0-3.07-1.63-5.64-4.5-6.32V4a1.5 1.5 0 0 0-3 0v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="#6b7280"/>
        </svg>
      </button>

      <div class="profile-menu">
        <button class="icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="#6b7280" stroke-width="1.8"/>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="#6b7280" stroke-width="1.8"/>
          </svg>
        </button>

        <div class="dropdown">
          <form class="logout-form" th:action="@{/mypage}" method="get">
                    <button class="logout-button" type="submit">마이페이지</button>
                </form>
                <form class="logout-form" th:action="@{/logout}" method="post">
                    <button class="logout-button" type="submit">로그아웃</button>
                </form>
        </div>
      </div>

    </div>
    </header>

    <main class="page-content">
        <div class="card project-summary-card">
        <div class="summary-header">
            <div class="summary-title-area">
                <h2 class="page-title">프로젝트 제목</h2>
                <span class="project-type-badge badge-collab">협업</span>
                <span class="collab-members">With. 최연주, 이하은</span>
            </div>
            <button class="btn-add" style="padding: 8px 16px;">협업 공유</button>
        </div>
        
        <div class="summary-meta">
            <span class="project-time">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 15"></polyline>
                </svg>
                방금 전
            </span>
        </div>

        <div class="summary-body">
            <p class="project-description">설명을 불러오는 중입니다...</p>
            <button class="btn-view-more hidden">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                자세히 보기
            </button>
        </div>
    </div>

    <section class="analysis-section">
        <div class="section-header">
            <h3 class="section-title">분석 기록 & 문서</h3>
            <button class="tab-add-btn">탭 추가 +</button>
        </div>

        <div class="mypage-tabs analysis-toolbar-tabs">
            <button class="tab-btn active" data-target="tab-user-simu">AI 유저 시뮬레이션</button>
            <button class="tab-btn" data-target="tab-market">시장&경쟁 분석</button>
            <button class="tab-btn" data-target="tab-finance">비용&수익성 분석</button>
            <button class="tab-btn" data-target="tab-plan">기획&피드백 AI</button>
            <button class="tab-btn" data-target="tab-scenario">시나리오 비교</button>
            <button class="tab-btn" data-target="tab-document">자동 문서화</button>
        </div>

        <div class="toolbar-bottom" style="margin-top: 20px;">
            <div class="sort-options">
                <label class="radio-label">
                    <input type="radio" name="sort" checked>
                    <span class="radio-dot"></span> 최신순
                </label>
                <label class="radio-label">
                    <input type="radio" name="sort">
                    <span class="radio-dot"></span> 즐겨찾기순
                </label>
            </div>
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="시뮬레이션 검색...">
            </div>
        </div>

        <div id="tab-user-simu" class="tab-content active">
            <div class="analysis-list">
                <div class="analysis-item">
                    <div class="item-status success">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="item-info">
                        <span class="item-title">AI 시뮬레이션 - 기본 세션</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit-small">편집</button>
                        <button class="btn-icon-only btn-star" onclick="toggleStar(this)">
                            <svg class="star-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </button>
                        <button class="btn-icon-only danger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                </div>
            </div> </div> <div id="tab-market" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                시장 분석 데이터가 없습니다. 분석을 시작해보세요!
            </div>
        </div>

        <div id="tab-finance" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                수익성 분석 데이터가 없습니다.
            </div>
        </div>

        <div id="tab-plan" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                기획 피드백 기록이 없습니다.
            </div>
        </div>

        <div id="tab-scenario" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                시나리오 비교 기록이 없습니다.
            </div>
        </div>

        <div id="tab-document" class="tab-content">
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                자동 문서화 기록이 없습니다.
            </div>
        </div>

        <div class="analysis-footer" style="text-align: center;">
            <button class="btn-primary" style="border-radius: 30px; margin-top: 30px; padding: 12px 40px; font-size: 16px;">분석하기</button>
        </div>
    </section>
    </main>
</div>

<script th:src="@{/js/sidebar.js}"></script>

<div id="shareModal" class="popup-overlay hidden">
    <div class="popup share-popup">
        <div class="popup-header">
            <h3 class="share-title">“<span id="modalProjectTitle">프로젝트 제목</span>” 공유</h3>
        </div>
        
        <div class="share-section">
            <label class="share-label">사용자 추가</label>
            <div class="share-input-row">
                <input type="text" id="shareEmailInput" placeholder="이메일 입력 후 엔터..." class="form-input" 
                    onkeypress="if(event.keyCode==13) { addMemberByEmail(); }">
            </div>
        </div>

        <div class="share-section">
            <label class="share-label">사용자</label>
            <div class="member-scroll-list" id="modalMemberList">
                </div>
        </div>

        <div class="form-actions" style="margin-top: 24px;">
            <button class="btn-primary" onclick="closeShareModal()" style="min-width: 100px; padding: 10px;">확인</button>
            <button class="btn-cancel" onclick="closeShareModal()" style="min-width: 100px; padding: 10px;">취소</button>
        </div>
    </div>
</div>

<div id="addTabModal" class="popup-overlay hidden">
    <div class="popup add-tab-popup">
        <div class="popup-header">
            <h2 class="popup-title" style="font-size: 24px; font-weight: 800;">탭 추가</h2>
        </div>
        <div class="form-section" style="margin-top: 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="font-size: 18px; font-weight: 700; white-space: nowrap;">탭 이름</label>
                <input type="text" id="newTabName" placeholder="탭 이름을 입력하세요" class="form-input" 
                       style="background: #f8fafc; border: 1px solid #e2e8f0; height: 45px;">
            </div>
        </div>
        <div class="form-actions" style="margin-top: 30px; gap: 15px;">
            <button class="btn-cancel" onclick="closeTabModal()" style="flex: 1; height: 50px; background: #eee; font-size: 18px;">취소</button>
            <button class="btn-primary" onclick="createTab()" style="flex: 1; height: 50px; background: #dbeafe; color: #2563eb; font-size: 18px;">추가</button>
        </div>
    </div>
</div>

<script>
    /* ============================================================
       SimuUser 상세 페이지 로직
       ============================================================ */

    let currentProject = null;

    /* ── [1] 상세 페이지 데이터 로드 ── */
    function loadProjectDetail() {
        const pathSegments = window.location.pathname.split('/');
        const projectId = pathSegments[pathSegments.length - 1];

        if (!projectId || projectId === 'detail') {
            alert("잘못된 접근입니다.");
            location.href = "/project/all";
            return;
        }

        const allProjects = JSON.parse(localStorage.getItem('simu_projects') || '[]');
        currentProject = allProjects.find(p => String(p.id) === projectId);

        if (currentProject) {
            const descElem = document.querySelector('.project-description');
            const viewMoreBtn = document.querySelector('.btn-view-more');
            
            document.querySelector('.bc-current').textContent = currentProject.title;
            document.querySelector('.page-title').textContent = currentProject.title;
            descElem.textContent = currentProject.description || '설명이 없습니다.';

            // 설명 길이 체크 및 버튼 제어
            setTimeout(() => {
                const lineHeight = parseFloat(window.getComputedStyle(descElem).lineHeight);
                const scrollHeight = descElem.scrollHeight;
                const maxHeight = lineHeight * 3.1;

                if (scrollHeight <= maxHeight) {
                    if(viewMoreBtn) viewMoreBtn.classList.add('hidden');
                    descElem.classList.add('expanded');
                } else {
                    if(viewMoreBtn) viewMoreBtn.classList.remove('hidden');
                }
            }, 100);

            // 펼치기/접기 이벤트
            if(viewMoreBtn) {
                viewMoreBtn.onclick = function() {
                    const isExpanded = descElem.classList.contains('expanded');
                    if (isExpanded) {
                        descElem.classList.remove('expanded');
                        this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg> 자세히 보기`;
                    } else {
                        descElem.classList.add('expanded');
                        this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg> 설명 접기`;
                    }
                };
            }

            // 협업 정보 반영
            const collabBadge = document.querySelector('.badge-collab');
            const collabText = document.querySelector('.collab-members');
            if (currentProject.type === 'collab') {
                if(collabBadge) collabBadge.style.display = 'inline-block';
                if(collabText) collabText.textContent = `With. ${currentProject.members ? currentProject.members.join(', ') : ''}`;
            } else {
                if(collabBadge) collabBadge.style.display = 'none';
                if(collabText) collabText.style.display = 'none';
            }
        }
    }

    /* ── [2] 탭 시스템 (무한 추가 가능 버전) ── */
    
    // 💡 1. 탭 추가 모달 열기 (안전한 방식으로 변경)
    function openTabModal() {
        const modal = document.getElementById('addTabModal');
        const input = document.getElementById('newTabName');
        
        modal.classList.remove('hidden');
        input.value = ""; // 창을 열 때마다 이전 입력값 깔끔하게 비우기
        setTimeout(() => input.focus(), 10); // 창이 열린 후 바로 타자 칠 수 있게 포커스
    }

    // 💡 2. 탭 추가 모달 닫기 (절대 실패하지 않는 방식으로 변경)
    function closeTabModal() {
        document.getElementById('addTabModal').classList.add('hidden');
    }

    function createTab() {
        const input = document.getElementById('newTabName');
        const tabName = input.value.trim();

        if (!tabName) {
            alert("탭 이름을 입력해주세요.");
            return false;
        }

        const exists = Array.from(document.querySelectorAll('.tab-btn'))
            .some(btn => btn.textContent.trim() === tabName);

        if (exists) {
            alert("이미 존재하는 탭 이름입니다.");
            return false;
        }

        const tabId = "tab-" + Date.now();
        const tabContainer = document.querySelector('.analysis-toolbar-tabs');

        const newBtn = document.createElement('button');
        // 💡 핵심 변경: 새로 추가된 탭 버튼에 'custom-tab' 이라는 식별자(클래스)를 추가합니다.
        newBtn.className = 'tab-btn custom-tab'; 
        newBtn.setAttribute('data-target', tabId);
        newBtn.textContent = tabName;
        tabContainer.appendChild(newBtn);

        const analysisSection = document.querySelector('.analysis-section');
        const footer = document.querySelector('.analysis-footer');

        const newContent = document.createElement('div');
        newContent.id = tabId;
        newContent.className = 'tab-content';
        newContent.innerHTML = `
            <div class="empty-state" style="padding: 40px; text-align: center; color: #94a3b8;">
                "${tabName}" 관련 기록이 없습니다.
            </div>
        `;

        // 새 콘텐츠를 footer 바로 위에 삽입
        analysisSection.insertBefore(newContent, footer);

        // 새 탭으로 이동
        switchTab(newBtn);

        // 모달 닫기
        document.getElementById('addTabModal').classList.add('hidden');
        input.value = "";
    }

    function initTabs() {
        const tabContainer = document.querySelector('.analysis-toolbar-tabs');
        if (tabContainer) {
            tabContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.tab-btn');
                if (btn) switchTab(btn);
            });
        }

        const btnAddTab = document.querySelector('.tab-add-btn');
        if (btnAddTab) {
            btnAddTab.onclick = openTabModal; 
        }
    }

    function switchTab(btn) {
        const targetId = btn.getAttribute('data-target');

        // 모든 탭 버튼 비활성화 후 클릭된 버튼 활성화
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 모든 콘텐츠 숨김 후 타겟 콘텐츠 표시
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        
        const targetContent = document.getElementById(targetId);
        if (targetContent) {
            targetContent.classList.add('active');
        }

        // 💡 핵심 변경: 클릭한 탭이 추가한 탭(custom-tab)이면 '분석하기' 푸터를 숨깁니다.
        const footer = document.querySelector('.analysis-footer');
        if (footer) {
            if (btn.classList.contains('custom-tab')) {
                footer.style.display = 'none';   // 숨기기
            } else {
                footer.style.display = 'block';  // 기본 탭이면 다시 보이기
            }
        }
    }

    /* ── [3] 멤버 관리 (협업 공유) ── */
    function renderModalMembers() {
        const listContainer = document.getElementById('modalMemberList');
        if(!listContainer || !currentProject) return;

        let html = `
            <div class="share-member-item">
                <div class="member-profile-info">
                    <div class="profile-avatar-small"></div>
                    <div class="member-text"><span class="member-name">정유나(Me)</span><span class="member-email">nfling@gmail.com</span></div>
                </div>
                <span class="member-role">소유자</span>
            </div>`;

        if (currentProject.members) {
            currentProject.members.forEach((email, idx) => {
                html += `
                <div class="share-member-item">
                    <div class="member-profile-info">
                        <div class="profile-avatar-small"></div>
                        <div class="member-text"><span class="member-name">${email.split('@')[0]}</span><span class="member-email">${email}</span></div>
                    </div>
                    <button onclick="removeMember(${idx})" style="color:#ef4444; background:none; border:none; cursor:pointer;">삭제</button>
                </div>`;
            });
        }
        listContainer.innerHTML = html;
    }

    function addMemberByEmail() {
        const input = document.getElementById('shareEmailInput');
        const email = input.value.trim();
        if(!email.includes('@')) return alert("이메일 형식이 아닙니다.");

        if(!currentProject.members) currentProject.members = [];
        currentProject.members.push(email);
        
        updateLocalStorage();
        input.value = "";
        renderModalMembers();
        loadProjectDetail(); // 요약카드 With 텍스트 갱신
    }

    function removeMember(idx) {
        currentProject.members.splice(idx, 1);
        updateLocalStorage();
        renderModalMembers();
        loadProjectDetail();
    }

    function updateLocalStorage() {
        const allProjects = JSON.parse(localStorage.getItem('simu_projects') || '[]');
        const pIdx = allProjects.findIndex(p => String(p.id) === String(currentProject.id));
        if(pIdx !== -1) {
            allProjects[pIdx].members = currentProject.members;
            localStorage.setItem('simu_projects', JSON.stringify(allProjects));
        }
    }

    /* ── [4] 모달 제어 및 초기화 ── */
    const shareModal = document.getElementById('shareModal');
    const addTabModal = document.getElementById('addTabModal');

    document.querySelector('.btn-add').onclick = () => {
        document.getElementById('modalProjectTitle').textContent = currentProject.title;
        renderModalMembers();
        shareModal.classList.remove('hidden');
    };

    // 💡 협업 공유 모달 닫기
    function closeShareModal() {
        shareModal.classList.add('hidden');
    }

    // 💡 탭 추가 모달 닫기 (새로 추가된 함수!)
    function closeTabModal() {
        addTabModal.classList.add('hidden');
    }

    // 바깥 영역 클릭 시 닫기 (안전한 방식으로 변경)
    window.onclick = (e) => {
        const shareModal = document.getElementById('shareModal');
        const addTabModal = document.getElementById('addTabModal');
        
        if (e.target === shareModal) closeShareModal();
        if (e.target === addTabModal) closeTabModal();
    };

    function toggleStar(btn) { btn.classList.toggle('active'); }

    document.addEventListener('DOMContentLoaded', () => {
        loadProjectDetail();
        initTabs();
    });
</script>
</body>
</html>
