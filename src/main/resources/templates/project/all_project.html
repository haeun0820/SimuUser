<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 프로젝트 – SimuUser</title>
  <link rel="stylesheet" th:href="@{/css/project/project.css}">
  <link rel="stylesheet" th:href="@{/css/header/header.css}">
</head>
<body>
<div class="app-layout">

  <!-- ① 사이드바 -->
  <div id="sidebar-root" data-active="all-projects"></div>

  <!-- ② 메인 영역 -->
  <div class="main-area">

    <!-- 상단 헤더 / 브레드크럼 -->
    <header th:replace="header/header :: header('전체 프로젝트')"></header>

    <!-- 페이지 콘텐츠 -->
    <main class="page-content">

      <!-- 페이지 타이틀 -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
        <div>
          <h1 class="page-title">전체 프로젝트</h1>
          <p class="page-subtitle" id="projectCountLabel" style="margin-top:4px;">총 0개의 프로젝트</p>
        </div>
        <a th:href="@{/project/new}" class="btn-new-project">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          새 프로젝트
        </a>
      </div>

      <!-- 툴바: 검색 + 필터 -->
      <div class="projects-toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke="#9ca3af" stroke-width="1.8"/>
            <path d="M21 21l-4.35-4.35" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" placeholder="프로젝트 검색..">
        </div>

        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">
            <span class="filter-dot" style="background:#011b53;"></span>전체
          </button>
          <button class="filter-tab" data-filter="collab">
            <span class="filter-dot" style="background:#f59e0b;"></span>협업
          </button>
          <button class="filter-tab" data-filter="personal">
            <span class="filter-dot" style="background:#22c55e;"></span>개인
          </button>
        </div>
      </div>

      <!-- 프로젝트 그리드 -->
      <div class="projects-grid" id="projectsGrid">
        <!-- JS로 렌더링 -->
      </div>

    </main>
  </div>
</div>

<!-- 사이드바 컴포넌트 -->
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/header.js}"></script>
<script>
  /* ============================================================
     all-projects.js (inline)
     ============================================================ */

  let allProjects = [];
  let currentFilter = 'all';
  let searchQuery = '';

  /* ── 산업 분야 라벨 맵 ── */
  const industryMap = {
    commerce: '커머스/쇼핑', fintech: '금융/핀테크', health: '의료/헬스케어',
    edu: '교육/에듀테크', content: '콘텐츠/엔터테인먼트', social: '소셜/커뮤니티',
    mobility: '모빌리티/여행', productivity: '생산성/비즈니스', '': ''
  };

  /* ── 시간 포맷 ── */
  function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return `${min}분 전`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}시간 전`;
    const day = Math.floor(hr / 24);
    return `${day}일 전`;
  }


  /* ── 카드 렌더 ── */
  function renderCard(p) {
    const isCollab = p.type === 'collab';
    const badge = isCollab
      ? '<span class="project-type-badge badge-collab">협업</span>'
      : '<span class="project-type-badge badge-personal">개인</span>';

    const memberInfo = isCollab && p.members && p.members.length > 0
      ? `<span class="project-members">With. ${p.members.map(escHtml).join(', ')}</span>`
      : '';

    const industryTag = p.industry
      ? `<span style="font-size:11.5px;background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:20px;">${escHtml(industryMap[p.industry] || p.industry)}</span>`
      : '';

    // 하나의 백틱(`) 안에 모든 HTML 구조를 넣어야 합니다.
    return `
      <div class="project-card" data-id="${p.id}">
        <div class="project-card-head">
          <span class="project-card-title">${escHtml(p.title)}</span>
          ${badge}
        </div>
        ${p.description
          ? `<p class="project-card-desc">${escHtml(p.description)}</p>`
          : '<p class="project-card-desc" style="color:#d1d5db;">설명이 없습니다.</p>'}
        <div style="margin-top:10px;">${industryTag}</div>
        <div class="project-card-footer">
          <span class="project-time">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            ${timeAgo(p.createdAt)}
          </span>
          ${memberInfo}
        </div>
        <div class="project-card-action">
          <button class="btn-detail" onclick="goToDetail('${p.id}')">상세 보기 →</button>
        </div>
      </div>`;
  }

    /* ── 상세 페이지 이동 함수 추가 ── */
  function goToDetail(projectId) {
    // 상세 페이지 파일명이 project_detail.html 이라고 가정할 때
    // 프로젝트 ID를 쿼리 스트링(?id=...)으로 전달합니다.
    window.location.href = `/project/detail/${projectId}`; 
    // 타임리프/서버 환경이라면 URL 구조에 맞춰 수정하세요 (예: `/projects/${projectId}`)
  }

  /* ── 렌더링 ── */
  function renderProjects() {
    const grid = document.getElementById('projectsGrid');

    let filtered = allProjects.filter(p => {
      const matchFilter =
        currentFilter === 'all' ||
        (currentFilter === 'collab' && p.type === 'collab') ||
        (currentFilter === 'personal' && p.type === 'personal');

      const q = searchQuery.toLowerCase();
      const matchSearch = !q ||
        p.title.toLowerCase().includes(q) ||
        (p.description || '').toLowerCase().includes(q);

      return matchFilter && matchSearch;
    });

    document.getElementById('projectCountLabel').textContent = `총 ${filtered.length}개의 프로젝트`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p>${searchQuery ? '검색 결과가 없습니다.' : '프로젝트가 없습니다.'}</p>
          <span>${searchQuery ? '다른 검색어를 입력해보세요.' : '새 프로젝트를 만들어 시작해보세요!'}</span>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(renderCard).join('');
  }

  /* ── 필터 탭 ── */
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderProjects();
    });
  });

  /* ── 검색 ── */
  document.getElementById('searchInput').addEventListener('input', function () {
    searchQuery = this.value;
    renderProjects();
  });

  /* ── 초기 로드 ── */
  async function init() {
    try {
      const response = await fetch('/api/projects');
      if (!response.ok) {
        throw new Error('프로젝트 목록을 불러오지 못했습니다.');
      }
      allProjects = await response.json();
    } catch (error) {
      allProjects = [];
      console.error(error);
    }
    renderProjects();
  }

  init();

  /* ── 유틸 ── */
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
