    <!DOCTYPE html>
    <html lang="ko" xmlns:th="http://www.thymeleaf.org">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>새 프로젝트 – SimuUser</title>
    <link rel="stylesheet" th:href="@{/css/project/project_edit.css}">
    <link rel="stylesheet" th:href="@{/css/header/header.css}">
    </head>
    <body>
    <div class="app-layout">

    <!-- ① 사이드바 (sidebar.js가 이 div를 교체) -->
    <div id="sidebar-root" data-active="new-project"></div>

    <!-- ② 메인 영역 -->
    <div class="main-area">

        <!-- 상단 헤더 / 브레드크럼 -->
        <header th:replace="~{header/header :: header(${ {'프로젝트','프로젝트 수정'} })}"></header>

        <!-- 페이지 콘텐츠 -->
        <main class="page-content">

        <!-- 페이지 타이틀 -->
        <div class="page-header">
            <div class="page-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            </div>
            <div>
            <div class="page-title">프로젝트 수정</div>
            <div class="page-subtitle">프로젝트 정보를 수정해주세요</div>
            </div>
        </div>

        <!-- 폼 카드 -->
        <div class="card">
            <p class="required-note"><span class="required-star">*</span> 표시는 필수 입력란입니다.</p>

            <form id="projectForm" novalidate>
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- 서비스 아이디어 -->
            <div class="form-section form-group">
                <label class="form-label" for="serviceIdea">
                서비스 아이디어 <span class="required-star">*</span>
                </label>
                <input
                class="form-input"
                id="serviceIdea"
                th:value="${project.title}"
                type="text"
                placeholder="예 : AI 기반 맞춤형 식단 추천 앱"
                maxlength="200"
                >
                <span class="form-hint">한 문장으로 서비스를 표현해주세요</span>
                <div class="field-error" id="err-serviceIdea">서비스 아이디어를 입력해주세요.</div>
            </div>

            <!-- 상세 설명 -->
            <div class="form-section form-group">
                <label class="form-label" for="description">상세 설명</label>
                <textarea
                class="form-textarea"
                id="description"
                th:text="${project.description}"
                placeholder="서비스의 핵심 기능, 해결하려는 문제, 차별점 등을 자유롭게 작성해주세요."
                style="min-height:140px;"
                ></textarea>
            </div>

            <!-- 타겟 유저 / 산업 분야 -->
            <div class="form-row">
                <div class="form-group">
                <label class="form-label" for="targetUser">타겟 유저</label>
                <input
                    class="form-input"
                    id="targetUser"
                    th:value="${project.targetUser}"
                    type="text"
                    placeholder="예 : 20~30대 직장인"
                >
                </div>
                <div class="form-group">
                <label class="form-label" for="industry">산업 분야</label>
                <select class="form-select" id="industry">
                    <option value="">선택해주세요</option>
                    <option value="commerce" th:selected="${project.industry == 'commerce'}">커머스/쇼핑</option>
                    <option value="fintech" th:selected="${project.industry == 'fintech'}">금융/핀테크</option>
                    <option value="health" th:selected="${project.industry == 'health'}">의료/헬스케어</option>
                    <option value="edu" th:selected="${project.industry == 'edu'}">교육/에듀테크</option>
                    <option value="content" th:selected="${project.industry == 'content'}">콘텐츠/엔터테인먼트</option>
                    <option value="social" th:selected="${project.industry == 'social'}">소셜/커뮤니티</option>
                    <option value="mobility" th:selected="${project.industry == 'mobility'}">모빌리티/여행</option>
                    <option value="productivity" th:selected="${project.industry == 'productivity'}">생산성/비즈니스</option>
                </select>
                </div>
            </div>

            <!-- 프로젝트 종류 / 팀원 초대 -->
            <div class="form-row" id="typeInviteRow" style="align-items:flex-start;">

                <!-- 프로젝트 종류 -->
                <div class="form-group">
                <label class="form-label">
                    프로젝트 종류 <span class="required-star">*</span>
                </label>
                <div class="radio-group">
                    <label class="radio-label">
                    <input type="radio" name="projectType" value="personal" 
                        th:checked="${project.members == null || project.members.size() <= 1}">                        
                        <span class="radio-circle"></span> 개인
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="projectType" value="collab" 
                            th:checked="${project.members != null && project.members.size() > 1}">
                        <span class="radio-circle"></span> 협업
                    </label>
                </div>
                </div>

                <!-- 팀원 초대 (협업 선택 시에만 표시) -->
                <div class="form-group" id="teamInviteSection" style="display:none;">
                <label class="form-label">팀원 초대</label>
                <div class="team-invite-row">
                    <button type="button" class="btn-add" id="btnOpenMemberModal">팀원 추가</button>
                    <!-- 팀원 뱃지 (팀원이 있을 때만 표시) -->
                    <button type="button" class="member-badge" id="memberBadge" style="display:none;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    팀원 <span id="memberCount">0</span>명
                    </button>
                </div>
                </div>

            </div>

            <!-- 액션 버튼 -->
            <div class="form-actions">
                <button type="button" class="btn-cancel" id="btnCancel">취소</button>
                <button type="submit" class="btn-primary">프로젝트 수정</button>
            </div>

            </form>
        </div>
        </main>
    </div>
    </div>

    <!-- 팀원 추가 모달 -->
    <div class="popup-overlay" id="memberPopup" style="display:none;">
    <div class="popup new-project-share-popup">
        <div class="popup-header">
        <span class="popup-title">협업 공유</span>
        <button class="popup-close" id="btnClosePopup" aria-label="닫기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        </div>
        <div class="team-invite-row modal-invite-row">
        <input
            class="form-input"
            id="inviteEmail"
            type="email"
            placeholder="이메일 입력 후 엔터..."
        >
        <select class="form-select invite-role-select" id="inviteRoleSelect" aria-label="팀원 권한">
            <option value="편집자">편집자</option>
            <option value="뷰어">뷰어</option>
            <option value="관리자">관리자</option>
        </select>
        </div>
        <div id="userSearchResults" class="member-list invite-search-results" style="display:none;"></div>
        <div class="field-error" id="err-email">올바른 이메일을 입력해주세요.</div>
        <div class="member-list" id="memberList">
        <div class="empty-members">초대된 팀원이 없습니다.</div>
        </div>
        <div class="form-actions modal-actions">
        <button type="button" class="btn-primary" id="btnConfirmMembers">확인</button>
        <button type="button" class="btn-cancel" id="btnCancelMembers">취소</button>
        </div>
    </div>
    </div>

    <!-- 사이드바 컴포넌트 -->
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/header.js}"></script>



<script th:inline="javascript">
/*<![CDATA[*/
    const members = [];
    /*[# th:each="m : ${project.members}"]*/
    if (/*[[${m.role}]]*/ !== 'OWNER') {
        members.push({
            email: /*[[${m.email}]]*/ '',
            name: /*[[${m.name}]]*/ '', // 백엔드 ProjectMemberResponse의 name 필드 사용
            role: /*[[${m.role}]]*/ '편집자',
            profileImage: /*[[${m.profileImage}]]*/ ''
        });
    }
    /*[/]*/
/*]]>*/
    let memberModalSnapshot = [];
    let inviteSearchTimer;

    // 2. 페이지 로드 시 초기 UI 세팅
    window.addEventListener('DOMContentLoaded', () => {
        const projectTypeInput = document.querySelector('input[name="projectType"]:checked');
        const projectType = projectTypeInput ? projectTypeInput.value : 'personal';
        
        if (projectType === 'collab') {
            document.getElementById('teamInviteSection').style.display = '';
        }
        
        updateMemberBadge();
        renderMemberList();
    });

    /* ── 프로젝트 종류 토글 ── */
    document.querySelectorAll('input[name="projectType"]').forEach(radio => {
        radio.addEventListener('change', () => {
            const isCollab = radio.value === 'collab' && radio.checked;
            document.getElementById('teamInviteSection').style.display = isCollab ? '' : 'none';
            if (!isCollab) {
                members.splice(0, members.length);
                updateMemberBadge();
                renderMemberList();
            }
        });
    });

    /* ── 팀원 검색 및 추가 로직 ── */
    document.getElementById('inviteEmail').addEventListener('input', () => {
        clearTimeout(inviteSearchTimer);
        inviteSearchTimer = setTimeout(fetchInviteUsers, 250);
    });

    async function fetchInviteUsers() {
        const keyword = document.getElementById('inviteEmail').value.trim();
        if (keyword.length < 2) return;
        
        try {
            const response = await fetch(`/api/users/search?email=${encodeURIComponent(keyword)}`);
            const users = await response.json();
            const results = document.getElementById('userSearchResults');
            results.innerHTML = users.map(u => `
                <button type="button" class="invite-user-option" onclick="selectUser('${u.email}', '${u.name}')">
                    <span>${u.name} (${u.email})</span>
                </button>
            `).join('');
            results.style.display = 'block';
        } catch (e) {}
    }

    window.selectUser = function(email, name) {
        if(members.some(m => m.email === email)) {
            alert('이미 추가된 팀원입니다.');
            return;
        }
        members.push({ email, name, role: document.getElementById('inviteRoleSelect').value });
        document.getElementById('userSearchResults').style.display = 'none';
        document.getElementById('inviteEmail').value = '';
        updateMemberBadge();
        renderMemberList();
    }

    function updateMemberBadge() {
        const badge = document.getElementById('memberBadge');
        const countSpan = document.getElementById('memberCount');
        if(countSpan) countSpan.textContent = members.length;
        if(badge) badge.style.display = members.length > 0 ? 'inline-flex' : 'none';
    }

    function renderMemberList() {
        const list = document.getElementById('memberList');
        if (members.length === 0) {
            list.innerHTML = '<div class="empty-members">초대된 팀원이 없습니다.</div>';
            return;
        }
        list.innerHTML = members.map((m, i) => `
            <div class="member-item pending-member-item">
                <div class="pending-member-main">
                    <div class="pending-member-avatar">${escHtml(m.name.charAt(0).toUpperCase())}</div>
                    <div>
                        <div class="pending-member-name">${escHtml(m.name)}</div>
                        <div class="member-email">${escHtml(m.email)}</div>
                    </div>
                </div>
                <div class="pending-member-actions">
                    <span class="pending-member-role">${escHtml(m.role)}</span>
                    <button type="button" class="btn-remove" onclick="removeMember(${i})">삭제</button>
                </div>
            </div>`).join('');
    }

    window.removeMember = function(index) {
        members.splice(index, 1);
        updateMemberBadge();
        renderMemberList();
    }

    /* ── 팝업 제어 ── */
    document.getElementById('btnOpenMemberModal').addEventListener('click', () => {
        memberModalSnapshot = JSON.parse(JSON.stringify(members));
        document.getElementById('memberPopup').style.display = 'flex';
    });
    document.getElementById('btnClosePopup').addEventListener('click', () => document.getElementById('memberPopup').style.display = 'none');
    document.getElementById('btnConfirmMembers').addEventListener('click', () => document.getElementById('memberPopup').style.display = 'none');
    document.getElementById('btnCancelMembers').addEventListener('click', () => {
        members.splice(0, members.length, ...memberModalSnapshot);
        updateMemberBadge();
        renderMemberList();
        document.getElementById('memberPopup').style.display = 'none';
    });

    /* ── 최종 폼 제출 ── */
    document.getElementById('projectForm').addEventListener('submit', async e => {
        e.preventDefault();
        
        const projectId = /*[[${project.id}]]*/ null; 
        const projectData = {
            title: document.getElementById('serviceIdea').value.trim(),
            description: document.getElementById('description').value.trim(),
            targetUser: document.getElementById('targetUser').value.trim(),
            industry: document.getElementById('industry').value,
            members: members.map(m => m.email)
        };

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        const headers = { 'Content-Type': 'application/json' };
        if (csrfToken && csrfHeader) {
            headers[csrfHeader] = csrfToken;
        }

        try {
            const response = await fetch(`/api/projects/${projectId}`, {
                method: 'PATCH', 
                headers: headers,
                body: JSON.stringify(projectData)
            });

            if (response.ok) {
                alert('성공적으로 수정되었습니다.');
                window.location.href = '/project/all';
            } else {
                const err = await response.json();
                alert('수정 실패: ' + (err.message || '알 수 없는 오류'));
            }
        } catch (error) {
            alert('네트워크 오류가 발생했습니다.');
        }
    });

    function escHtml(str) {
        if (!str) return "";
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
/*]]>*/
</script>
    </body>
    </html>
