    <!DOCTYPE html>
    <html lang="ko" xmlns:th="http://www.thymeleaf.org">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>새 프로젝트 – SimuUser</title>
    <link rel="stylesheet" th:href="@{/css/project/project_edit.css}">
    <link rel="stylesheet" th:href="@{/css/header/header.css}">
    </head>
    <body>
    <div class="app-layout">

    <!-- ① 사이드바 (sidebar.js가 이 div를 교체) -->
    <div id="sidebar-root" data-active="new-project"></div>

    <!-- ② 메인 영역 -->
    <div class="main-area">

        <!-- 상단 헤더 / 브레드크럼 -->
        <header th:replace="~{header/header :: header(${ {'프로젝트','프로젝트 수정'} })}"></header>

        <!-- 페이지 콘텐츠 -->
        <main class="page-content">

        <!-- 페이지 타이틀 -->
        <div class="page-header">
            <div class="page-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            </div>
            <div>
            <div class="page-title">프로젝트 수정</div>
            <div class="page-subtitle">프로젝트 정보를 수정해주세요</div>
            </div>
        </div>

        <!-- 폼 카드 -->
        <div class="card">
            <p class="required-note"><span class="required-star">*</span> 표시는 필수 입력란입니다.</p>

            <form id="projectForm" novalidate>
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- 서비스 아이디어 -->
            <div class="form-section form-group">
                <label class="form-label" for="serviceIdea">
                서비스 아이디어 <span class="required-star">*</span>
                </label>
                <input
                class="form-input"
                id="serviceIdea"
                type="text"
                placeholder="예 : AI 기반 맞춤형 식단 추천 앱"
                maxlength="200"
                >
                <span class="form-hint">한 문장으로 서비스를 표현해주세요</span>
                <div class="field-error" id="err-serviceIdea">서비스 아이디어를 입력해주세요.</div>
            </div>

            <!-- 상세 설명 -->
            <div class="form-section form-group">
                <label class="form-label" for="description">상세 설명</label>
                <textarea
                class="form-textarea"
                id="description"
                placeholder="서비스의 핵심 기능, 해결하려는 문제, 차별점 등을 자유롭게 작성해주세요."
                style="min-height:140px;"
                ></textarea>
            </div>

            <!-- 타겟 유저 / 산업 분야 -->
            <div class="form-row">
                <div class="form-group">
                <label class="form-label" for="targetUser">타겟 유저</label>
                <input
                    class="form-input"
                    id="targetUser"
                    type="text"
                    placeholder="예 : 20~30대 직장인"
                >
                </div>
                <div class="form-group">
                <label class="form-label" for="industry">산업 분야</label>
                <select class="form-select" id="industry">
                    <option value="">선택해주세요</option>
                    <option value="commerce">커머스/쇼핑</option>
                    <option value="fintech">금융/핀테크</option>
                    <option value="health">의료/헬스케어</option>
                    <option value="edu">교육/에듀테크</option>
                    <option value="content">콘텐츠/엔터테인먼트</option>
                    <option value="social">소셜/커뮤니티</option>
                    <option value="mobility">모빌리티/여행</option>
                    <option value="productivity">생산성/비즈니스</option>
                </select>
                </div>
            </div>

            <!-- 프로젝트 종류 / 팀원 초대 -->
            <div class="form-row" id="typeInviteRow" style="align-items:flex-start;">

                <!-- 프로젝트 종류 -->
                <div class="form-group">
                <label class="form-label">
                    프로젝트 종류 <span class="required-star">*</span>
                </label>
                <div class="radio-group">
                    <label class="radio-label">
                    <input type="radio" name="projectType" value="personal" checked>
                    <span class="radio-circle"></span>
                    개인
                    </label>
                    <label class="radio-label">
                    <input type="radio" name="projectType" value="collab">
                    <span class="radio-circle"></span>
                    협업
                    </label>
                </div>
                </div>

                <!-- 팀원 초대 (협업 선택 시에만 표시) -->
                <div class="form-group" id="teamInviteSection" style="display:none;">
                <label class="form-label">팀원 초대</label>
                <div class="team-invite-row">
                    <button type="button" class="btn-add" id="btnOpenMemberModal">팀원 추가</button>
                    <!-- 팀원 뱃지 (팀원이 있을 때만 표시) -->
                    <button type="button" class="member-badge" id="memberBadge" style="display:none;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    팀원 <span id="memberCount">0</span>명
                    </button>
                </div>
                </div>

            </div>

            <!-- 액션 버튼 -->
            <div class="form-actions">
                <button type="button" class="btn-cancel" id="btnCancel">취소</button>
                <button type="submit" class="btn-primary">프로젝트 수정</button>
            </div>

            </form>
        </div>
        </main>
    </div>
    </div>

    <!-- 팀원 추가 모달 -->
    <div class="popup-overlay" id="memberPopup" style="display:none;">
    <div class="popup new-project-share-popup">
        <div class="popup-header">
        <span class="popup-title">협업 공유</span>
        <button class="popup-close" id="btnClosePopup" aria-label="닫기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        </div>
        <div class="team-invite-row modal-invite-row">
        <input
            class="form-input"
            id="inviteEmail"
            type="email"
            placeholder="이메일 입력 후 엔터..."
        >
        <select class="form-select invite-role-select" id="inviteRoleSelect" aria-label="팀원 권한">
            <option value="편집자">편집자</option>
            <option value="뷰어">뷰어</option>
            <option value="관리자">관리자</option>
        </select>
        </div>
        <div id="userSearchResults" class="member-list invite-search-results" style="display:none;"></div>
        <div class="field-error" id="err-email">올바른 이메일을 입력해주세요.</div>
        <div class="member-list" id="memberList">
        <div class="empty-members">초대된 팀원이 없습니다.</div>
        </div>
        <div class="form-actions modal-actions">
        <button type="button" class="btn-primary" id="btnConfirmMembers">확인</button>
        <button type="button" class="btn-cancel" id="btnCancelMembers">취소</button>
        </div>
    </div>
    </div>

    <!-- 사이드바 컴포넌트 -->
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/header.js}"></script>

    <script>
    /* ============================================================
        new-project.js (inline)
        ============================================================ */

    const members = [];
    let memberModalSnapshot = [];
    let inviteSearchTimer;

    /* ── 프로젝트 종류 토글 ── */
    document.querySelectorAll('input[name="projectType"]').forEach(radio => {
        radio.addEventListener('change', () => {
        const isCollab = radio.value === 'collab' && radio.checked;
        document.getElementById('teamInviteSection').style.display = isCollab ? '' : 'none';
        if (!isCollab) {
            members.splice(0, members.length);
            updateMemberBadge();
            renderMemberList();
        }
        });
    });

    /* ── 팀원 추가 ── */
    document.getElementById('inviteEmail').addEventListener('input', searchInviteUsers);
    document.getElementById('inviteEmail').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); stageMember(); }
    });

    function searchInviteUsers() {
        document.getElementById('inviteEmail').dataset.name = '';
        clearTimeout(inviteSearchTimer);
        inviteSearchTimer = setTimeout(fetchInviteUsers, 250);
    }

    async function fetchInviteUsers() {
        const input = document.getElementById('inviteEmail');
        const results = document.getElementById('userSearchResults');
        const keyword = input.value.trim();

        if (keyword.length < 2) {
        results.style.display = 'none';
        results.innerHTML = '';
        return;
        }

        const response = await fetch(`/api/users/search?email=${encodeURIComponent(keyword)}`);
        if (!response.ok) {
        results.style.display = 'none';
        results.innerHTML = '';
        return;
        }

        const users = await response.json();
        if (users.length === 0) {
        results.style.display = 'none';
        results.innerHTML = '';
        return;
        }

        results.innerHTML = users.map(user => {
        const displayName = user.name || user.userId || user.email;
        const initial = displayName.charAt(0).toUpperCase();
        const avatar = user.profileImage
            ? `<img src="${escHtml(user.profileImage)}" alt="" class="search-user-avatar-img">`
            : escHtml(initial);
        return `
        <button type="button" class="invite-user-option"
                data-email="${escHtml(user.email)}"
                data-name="${escHtml(displayName)}"
                data-profile-image="${escHtml(user.profileImage || '')}">
            <span class="search-user-avatar">${avatar}</span>
            <span class="search-user-text">
            <span class="search-user-name">${escHtml(displayName)}</span>
            <span class="search-user-email">${escHtml(user.email)}</span>
            </span>
            <span class="search-user-action">추가</span>
        </button>`;
        }).join('');
        results.style.display = 'block';

        results.querySelectorAll('.invite-user-option').forEach(button => {
        button.addEventListener('click', async () => {
            input.value = button.dataset.email;
            input.dataset.name = button.dataset.name || '';
            input.dataset.profileImage = button.dataset.profileImage || '';
            results.style.display = 'none';
            results.innerHTML = '';
            await stageMember();
        });
        });
    }

    async function stageMember() {
        const input = document.getElementById('inviteEmail');
        const errEl = document.getElementById('err-email');
        const email = input.value.trim();
        const role = document.getElementById('inviteRoleSelect').value;
        const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!email || !emailRe.test(email)) {
        input.classList.add('error');
        errEl.style.display = 'block';
        return;
        }
        if (members.some(member => member.email.toLowerCase() === email.toLowerCase())) {
        input.classList.add('error');
        errEl.textContent = '이미 추가된 이메일입니다.';
        errEl.style.display = 'block';
        return;
        }

        const foundUser = await findInviteUser(email);
        const name = foundUser?.name || foundUser?.userId || input.dataset.name || email;
        const profileImage = foundUser?.profileImage || input.dataset.profileImage || '';

        input.classList.remove('error');
        errEl.style.display = 'none';
        errEl.textContent = '올바른 이메일을 입력해주세요.';
        document.getElementById('userSearchResults').style.display = 'none';

        members.push({ email, role, name, profileImage });
        input.value = '';
        input.dataset.name = '';
        input.dataset.profileImage = '';
        updateMemberBadge();
        renderMemberList();
    }

    async function findInviteUser(email) {
        try {
        const response = await fetch(`/api/users/search?email=${encodeURIComponent(email)}`);
        if (!response.ok) return null;
        const users = await response.json();
        return users.find(user => user.email && user.email.toLowerCase() === email.toLowerCase()) || null;
        } catch (e) {
        return null;
        }
    }

    function updateMemberBadge() {
        const badge = document.getElementById('memberBadge');
        document.getElementById('memberCount').textContent = members.length;
        badge.style.display = members.length > 0 ? 'inline-flex' : 'none';
    }

    function renderMemberList() {
        const list = document.getElementById('memberList');
        if (members.length === 0) {
        list.innerHTML = '<div class="empty-members">초대된 팀원이 없습니다.</div>';
        return;
        }
        list.innerHTML = members.map((member, i) => `
        <div class="member-item pending-member-item">
            <div class="pending-member-main">
            <div class="pending-member-avatar">${member.profileImage ? `<img src="${escHtml(member.profileImage)}" alt="" class="pending-member-avatar-img">` : escHtml((member.name || member.email).charAt(0).toUpperCase())}</div>
            <div>
                <div class="pending-member-name">${escHtml(member.name || member.email)} <span class="pending-member-status">요청 예정</span></div>
                <div class="member-email">${escHtml(member.email)}</div>
            </div>
            </div>
            <div class="pending-member-actions">
            <span class="pending-member-role">${escHtml(member.role || '편집자')}</span>
            <button class="btn-remove" data-index="${i}">삭제</button>
            </div>
        </div>`).join('');

        list.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', () => {
            members.splice(Number(btn.dataset.index), 1);
            updateMemberBadge();
            renderMemberList();
        });
        });
    }

    /* ── 팝업 열기/닫기 ── */
    document.getElementById('btnOpenMemberModal').addEventListener('click', openMemberModal);
    document.getElementById('memberBadge').addEventListener('click', openMemberModal);
    document.getElementById('btnConfirmMembers').addEventListener('click', () => closeMemberModal(true));
    document.getElementById('btnCancelMembers').addEventListener('click', () => closeMemberModal(false));

    function openMemberModal() {
        memberModalSnapshot = members.map(member => ({ ...member }));
        renderMemberList();
        document.getElementById('memberPopup').style.display = 'flex';
        setTimeout(() => document.getElementById('inviteEmail')?.focus(), 0);
    }
    document.getElementById('btnClosePopup').addEventListener('click', () => closeMemberModal(false));
    document.getElementById('memberPopup').addEventListener('click', e => {
        if (e.target === document.getElementById('memberPopup')) closeMemberModal(false);
    });
    function closeMemberModal(confirmed) {
        if (!confirmed) {
        members.splice(0, members.length, ...memberModalSnapshot.map(member => ({ ...member })));
        updateMemberBadge();
        renderMemberList();
        }
        document.getElementById('inviteEmail').value = '';
        document.getElementById('inviteEmail').dataset.name = '';
        document.getElementById('inviteEmail').dataset.profileImage = '';
        document.getElementById('userSearchResults').style.display = 'none';
        document.getElementById('memberPopup').style.display = 'none';
    }

    /* ── 폼 제출 ── */
    document.getElementById('projectForm').addEventListener('submit', async e => {
        e.preventDefault();
        if (!validateForm()) return;

        const projectType = document.querySelector('input[name="projectType"]:checked').value;

        const memberInvites = members.map(member => ({
        email: member.email,
        role: member.role
        }));

        const project = {
        title: document.getElementById('serviceIdea').value.trim(),
        description: document.getElementById('description').value.trim(),
        targetUser: document.getElementById('targetUser').value.trim(),
        industry: document.getElementById('industry').value,
        type: projectType,
        members: projectType === 'collab' ? memberInvites.map(member => member.email) : [],
        memberInvites: projectType === 'collab' ? memberInvites : []
        };

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        const headers = { 'Content-Type': 'application/json' };

        if (csrfToken && csrfHeader) {
        headers[csrfHeader] = csrfToken;
        }

        const response = await fetch('/api/projects', {
        method: 'POST',
        headers,
        body: JSON.stringify(project)
        });

        if (!response.ok) {
        const result = await response.json().catch(() => ({ message: '프로젝트 수정에 실패했습니다.' }));
        alert(result.message || '프로젝트 수정에 실패했습니다.');
        return;
        }

        // 전체 프로젝트 화면으로 이동
        window.location.href = '/project/all';
    });

    function validateForm() {
        let valid = true;
        const idea = document.getElementById('serviceIdea');
        const errIdea = document.getElementById('err-serviceIdea');

        if (!idea.value.trim()) {
        idea.classList.add('error');
        errIdea.style.display = 'block';
        valid = false;
        } else {
        idea.classList.remove('error');
        errIdea.style.display = 'none';
        }
        return valid;
    }

    document.getElementById('serviceIdea').addEventListener('input', function () {
        if (this.value.trim()) {
        this.classList.remove('error');
        document.getElementById('err-serviceIdea').style.display = 'none';
        }
    });

    /* ── 취소 버튼 ── */
    document.getElementById('btnCancel').addEventListener('click', () => {
        if (confirm('입력한 내용이 저장되지 않습니다. 취소하시겠습니까?')) {
        window.location.href = '/project/all';
        }
    });

    /* ── 유틸 ── */
    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    </script>
    </body>
    </html>
