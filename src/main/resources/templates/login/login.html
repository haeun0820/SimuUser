<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuUser 로그인</title>
    <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>
<main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="brand">
            <img class="brand-icon" src="/images/onlylogo.png" alt="">
            <h1 id="login-title">SimuUser</h1>
        </div>

        <p class="form-message success" th:if="${signupSuccessMessage}" th:text="${signupSuccessMessage}"></p>
        <p class="form-message error" th:if="${param.error}">아이디 또는 비밀번호를 확인하세요.</p>

        <div class="social-login" aria-label="소셜 로그인">
            <a class="social-button naver" th:href="@{/oauth2/authorization/naver}">
                <img src="/images/naver.png" class="provider-mark" alt="">
                <span>Naver로 계속하기</span>
            </a>
            <a class="social-button google" th:href="@{/oauth2/authorization/google}">
                <img src="/images/google.png" class="provider-mark google-mark" alt="">
                <span>Google로 계속하기</span>
            </a>
            <a class="social-button kakao" th:href="@{/oauth2/authorization/kakao}">
                <img src="/images/kakao.png" class="provider-mark kakao-mark" alt="">
                <span>Kakao로 계속하기</span>
            </a>
            <a class="social-button apple" href="#">
                <img src="/images/apple.png" class="provider-mark apple-mark" alt="">
                <span>Apple로 계속하기</span>
            </a>
        </div>

        <div class="divider">
            <span>또는</span>
        </div>

        <form class="email-login" th:action="@{/login}" method="post">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="visually-hidden" for="userId">아이디</label>
            <input id="userId" name="userId" type="text" autocomplete="username" placeholder="아이디를 입력하세요.">

            <label class="visually-hidden" for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요.">

            <button type="submit">로그인</button>
        </form>

        <div class="signup-link">
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </section>
</main>
</body>
</html>
