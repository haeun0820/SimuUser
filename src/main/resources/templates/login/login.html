<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>SimuUser 로그인</title>
    <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>
<main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="brand">
            <img class="brand-icon" src="/images/onlylogo.png" alt="">
            <h1 id="login-title">SimuUser</h1>
        </div>

        <p class="form-message success" th:if="${signupSuccessMessage}" th:text="${signupSuccessMessage}"></p>
        <p class="form-message error" th:if="${param.error}">아이디 또는 비밀번호를 확인해주세요.</p>

        <div class="social-login" aria-label="소셜 로그인">
            <a class="social-button naver" href="#"
               data-provider="naver"
               data-oauth-url="/oauth2/authorization/naver">
                <img src="/images/naver.png" class="provider-mark" alt="">
                <span>Naver로 계속하기</span>
            </a>
            <a class="social-button google" href="#"
               data-provider="google"
               data-oauth-url="/oauth2/authorization/google">
                <img src="/images/google.png" class="provider-mark google-mark" alt="">
                <span>Google로 계속하기</span>
            </a>
            <a class="social-button kakao" href="#"
               data-provider="kakao"
               data-oauth-url="/oauth2/authorization/kakao">
                <img src="/images/kakao.png" class="provider-mark kakao-mark" alt="">
                <span>Kakao로 계속하기</span>
            </a>
            <a class="social-button apple" href="#"
               data-provider="apple"
               data-oauth-url="/oauth2/authorization/apple">
                <img src="/images/apple.png" class="provider-mark apple-mark" alt="">
                <span>Apple로 계속하기</span>
            </a>
        </div>

        <div class="divider">
            <span>또는</span>
        </div>

        <form class="email-login" th:action="@{/login}" method="post">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="visually-hidden" for="userId">아이디</label>
            <input id="userId" name="userId" type="text" autocomplete="username" placeholder="아이디를 입력하세요">

            <label class="visually-hidden" for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요">

            <button type="submit">로그인</button>
        </form>

        <div class="signup-link">
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </section>

    <div id="extraInfoOverlay" style="display:none;" aria-modal="true" role="dialog" aria-labelledby="modalTitle">
        <div class="modal-panel">
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon"></div>
                <div>
                    <h2 id="modalTitle" class="modal-title">추가 정보 입력</h2>
                    <p class="modal-subtitle">소셜 회원가입을 완료하려면 아래 정보를 입력해주세요.</p>
                </div>
            </div>

            <div class="modal-body">
                <p class="modal-error" id="modalError"></p>

                <div class="modal-field">
                    <label for="m-email">이메일 주소 <span class="req">*</span></label>
                    <input type="email" id="m-email" placeholder="example@email.com" autocomplete="email">
                </div>
                <div class="modal-field">
                    <label for="m-nickname">닉네임 <span class="req">*</span></label>
                    <input type="text" id="m-nickname" placeholder="닉네임을 입력해주세요" autocomplete="nickname">
                </div>
                <div class="modal-field">
                    <label for="m-phone">전화번호 <span class="req">*</span></label>
                    <input type="tel" id="m-phone" placeholder="010-0000-0000" autocomplete="tel">
                </div>
                <div class="modal-field">
                    <label for="m-birth">생년월일 <span class="req">*</span></label>
                    <input type="date" id="m-birth" autocomplete="bday">
                </div>
                <div class="modal-field">
                    <label>성별 <span class="req">*</span></label>
                    <div class="gender-group">
                        <label class="gender-option">
                            <input type="radio" name="m-gender" value="male">
                            <span>남성</span>
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="m-gender" value="female">
                            <span>여성</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="modal-cancel" id="modalCancel">취소</button>
                <button type="button" class="modal-submit" id="modalSubmit" disabled>저장하고 계속하기</button>
            </div>
        </div>
    </div>
</main>
<script src="/js/login/login.js"></script>
</body>
</html>
