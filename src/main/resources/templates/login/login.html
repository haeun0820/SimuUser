<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuUser 로그인</title>
    <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>
<main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="brand">
            <div class="brand-icon" aria-hidden="true">
                <span class="brand-star"></span>
                <span class="brand-plus"></span>
                <span class="brand-dot"></span>
            </div>
            <h1 id="login-title">SimuUser</h1>
        </div>

        <p class="form-message success" th:if="${signupSuccessMessage}" th:text="${signupSuccessMessage}"></p>

        <div class="social-login" aria-label="소셜 로그인">
            <a class="social-button facebook" th:href="@{/oauth2/authorization/facebook}">
                <span class="provider-mark">f</span>
                <span>Facebook으로 계속하기</span>
            </a>
            <a class="social-button google" th:href="@{/oauth2/authorization/google}">
                <span class="provider-mark google-mark">G</span>
                <span>Google으로 계속하기</span>
            </a>
            <a class="social-button microsoft" href="#">
                <span class="provider-mark microsoft-mark" aria-hidden="true">
                    <span></span><span></span><span></span><span></span>
                </span>
                <span>Microsoft으로 계속하기</span>
            </a>
            <a class="social-button apple" href="#">
                <span class="provider-mark apple-mark">A</span>
                <span>Apple으로 계속하기</span>
            </a>
        </div>

        <div class="divider">
            <span>또는</span>
        </div>

        <form class="email-login" action="#" method="post">
            <label class="visually-hidden" for="userId">아이디</label>
            <input id="userId" name="userId" type="text" autocomplete="username" placeholder="아이디를 입력하세요.">

            <label class="visually-hidden" for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요.">

            <button type="submit">로그인</button>
        </form>

        <div class="signup-link">
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </section>
</main>
</body>
</html>
