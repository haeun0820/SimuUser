<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>마이페이지 | SimuUser</title>
    <link rel="stylesheet" th:href="@{/css/project/project.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/mypage.css}">
</head>
<body>
<div class="app-layout">

    <div id="sidebar-root" data-active=""></div>

    <div class="main-area">

        <header class="top-header">
            <nav class="breadcrumb-nav">
                <span class="bc-current" style="font-size: 18px; font-weight: bold; color: #111;">마이페이지</span>
            </nav>
            <div class="header-icons auth-actions">
                <button class="icon-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zM18 16v-5c0-3.07-1.63-5.64-4.5-6.32V4a1.5 1.5 0 0 0-3 0v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="#6b7280"/>
                    </svg>
                </button>
                <div class="profile-menu">
                    <button class="icon-btn profile-trigger">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="#333" stroke-width="2"/>
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="#333" stroke-width="2"/>
                        </svg>
                    </button>
                    <div class="dropdown">
                        <form class="logout-form" action="/mypage" method="get">
                            <button class="logout-button" type="submit">마이페이지</button>
                        </form>
                        <form class="logout-form" th:action="@{/logout}" method="post">
                            <button class="logout-button" type="submit">로그아웃</button>
                        </form>
                    </div>
                </div>
            </div>
        </header>

        <main class="page-content">
            <div class="profile-banner">
                <div class="profile-avatar-large">
                    <img id="displayProfileImage" class="profile-image profile-image-large" alt="프로필 이미지">
                    <div id="displayProfileFallback" class="profile-fallback-icon">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" fill="white"/>
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="white"/>
                        </svg>
                    </div>
                </div>
                <div class="profile-info">
                    <h2 class="profile-name" id="displayNickname">닉네임</h2>
                    <p class="profile-email" id="displayEmail"></p>
                    <div class="profile-stats">
                        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg> <span id="projectCountLabel">0개 프로젝트</span></span>
                        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg> <span id="analysisCountLabel">3개 분석</span></span>
                    </div>
                </div>
            </div>

            <div class="mypage-tabs">
                <button class="tab-btn active" data-target="tab-projects">내 프로젝트</button>
                <button class="tab-btn" data-target="tab-history">분석 기록</button>
                <button class="tab-btn" data-target="tab-profile">프로필 편집</button>
            </div>

            <div id="tab-projects" class="tab-content active">
                <div class="list-container" id="myProjectsList"></div>
            </div>

            <div id="tab-history" class="tab-content">
                <div class="list-container" id="myHistoryList"></div>
            </div>

            <div id="tab-profile" class="tab-content">
                <div class="profile-edit-card">
                    <div class="edit-avatar-section">
                        <div class="profile-avatar-medium">
                            <img id="editProfileImage" class="profile-image profile-image-medium" alt="프로필 이미지">
                            <div id="editProfileFallback" class="profile-fallback-icon profile-fallback-icon-small">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                                    <circle cx="12" cy="8" r="4" fill="white"/>
                                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="white"/>
                                </svg>
                            </div>
                        </div>
                        <div class="profile-image-actions">
                            <input type="file" id="profileImageInput" accept="image/*" hidden>
                            <button type="button" class="btn-change-image" id="changeImageButton">프로필 이미지 변경</button>
                            <p class="profile-image-help" id="profileImageHelp">이미지 파일을 업로드하면 프로필 사진이 변경됩니다.</p>
                        </div>
                    </div>

                    <form id="profileEditForm">
                        <div class="form-group">
                            <label for="inputName">이름</label>
                            <input type="text" id="inputName" value="" placeholder="이름을 입력해주세요">
                        </div>
                        <div class="form-group">
                            <label for="inputUserId">아이디</label>
                            <input type="text" id="inputUserId" value="" readonly style="background-color: #f8fafc;">
                            <small style="color: #94a3b8; font-size: 11px; margin-top: 4px; display: block;">아이디는 변경할 수 없습니다.</small>
                        </div>
                        <div class="form-group">
                            <label for="inputEmail">이메일</label>
                            <input type="email" id="inputEmail" value="" readonly style="background-color: #f8fafc;">
                            <small style="color: #94a3b8; font-size: 11px; margin-top: 4px; display: block;">소셜 연동 이메일은 변경할 수 없습니다.</small>
                        </div>
                        <div class="form-group">
                            <label for="inputPhone">전화번호</label>
                            <input type="tel" id="inputPhone" placeholder="010-0000-0000">
                        </div>
                        <div class="form-group">
                            <label for="inputBirthDate">생년월일</label>
                            <input type="date" id="inputBirthDate">
                        </div>
                        <div class="form-group">
                            <label>성별</label>
                            <div class="profile-radio-group">
                                <label><input type="radio" name="inputGender" value="male"> 남성</label>
                                <label><input type="radio" name="inputGender" value="female"> 여성</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="inputCurrentPassword">현재 비밀번호</label>
                            <input type="password" id="inputCurrentPassword" autocomplete="current-password" placeholder="비밀번호 변경 시 입력">
                            <p id="passwordMismatchMessage" class="profile-error-message"></p>
                        </div>
                        <div class="form-group">
                            <label for="inputNewPassword">새 비밀번호</label>
                            <input type="password" id="inputNewPassword" autocomplete="new-password" placeholder="새 비밀번호">
                        </div>
                        <div class="form-group">
                            <label for="inputNewPasswordConfirm">새 비밀번호 확인</label>
                            <input type="password" id="inputNewPasswordConfirm" autocomplete="new-password" placeholder="새 비밀번호 확인">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-save">저장하기</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/mypage/mypage.js"></script>
</body>
</html>
