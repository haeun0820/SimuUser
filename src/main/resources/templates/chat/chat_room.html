<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>SimuUser Chat</title>
    <link rel="stylesheet" th:href="@{/css/chat/chat_room.css}">
</head>
<body>
    <div class="chat-header" id="chatTitle">채팅</div>
    <div class="chat-messages" id="chatMsgs">
        <div class="msg">메시지를 불러오는 중입니다.</div>
    </div>
    <div class="chat-input-area">
        <div class="plus-menu-container">
            <button id="plusBtn" class="plus-btn" type="button">+</button>
            <div id="plusMenu" class="plus-menu">
                <button type="button" disabled>사진 전송</button>
                <button type="button" disabled>파일 업로드</button>
            </div>
        </div>
        <input type="text" id="msgInput" placeholder="메시지를 입력해주세요." onkeypress="if(event.keyCode==13) send()">
        <button id="sendBtn" onclick="send()" type="button">전송</button>
    </div>

    <script>
        const routeRoomId = window.location.pathname.split('/').pop();
        let roomId = routeRoomId;
        let lastMessageId = null;
        let isLoadingMessages = false;
        let isSending = false;
        let stream = null;
        let pollHandle = null;

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        const plusBtn = document.getElementById('plusBtn');
        const plusMenu = document.getElementById('plusMenu');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMsgs = document.getElementById('chatMsgs');

        plusBtn.onclick = (e) => {
            e.stopPropagation();
            plusMenu.classList.toggle('active');
        };

        document.addEventListener('click', () => {
            plusMenu.classList.remove('active');
        });

        function csrfHeaders() {
            return csrfToken && csrfHeader ? { [csrfHeader]: csrfToken } : {};
        }

        function formatTime(value) {
            if (!value) {
                return '';
            }
            return new Date(value).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        function setChatEnabled(enabled) {
            msgInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
        }

        function clearEmptyState() {
            if (chatMsgs.children.length === 1 && chatMsgs.firstElementChild?.classList.contains('msg')) {
                const text = chatMsgs.firstElementChild.textContent || '';
                if (text.includes('대화를 시작해보세요.') || text.includes('메시지를 불러오는 중입니다.')) {
                    chatMsgs.innerHTML = '';
                }
            }
        }

        function appendMessage(message) {
            if (!message || typeof message.id !== 'number') {
                return;
            }
            if (lastMessageId !== null && message.id <= lastMessageId) {
                return;
            }

            clearEmptyState();

            const div = document.createElement('div');
            div.className = message.mine ? 'msg my-msg' : 'msg';
            div.textContent = message.content;
            div.title = formatTime(message.createdAt);
            chatMsgs.appendChild(div);
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
            lastMessageId = message.id;
        }

        async function loadRoom() {
            const response = await fetch(`/api/chat/rooms/${routeRoomId}`, { cache: 'no-store' });
            const result = await response.json().catch(() => ({}));
            if (!response.ok) {
                document.getElementById('chatTitle').textContent = '채팅';
                chatMsgs.innerHTML = `<div class="msg">${result.message || '채팅방을 불러오지 못했습니다.'}</div>`;
                setChatEnabled(false);
                return false;
            }

            roomId = String(result.id);
            document.getElementById('chatTitle').textContent = result.name;
            return true;
        }

        async function syncMessages(reset = false) {
            if (isLoadingMessages) {
                return;
            }

            isLoadingMessages = true;
            try {
                const query = !reset && lastMessageId ? `?afterMessageId=${lastMessageId}` : '';
                const response = await fetch(`/api/chat/rooms/${roomId}/messages${query}`, {
                    cache: 'no-store'
                });
                const result = await response.json().catch(() => []);

                if (!response.ok) {
                    chatMsgs.innerHTML = `<div class="msg">${result.message || '메시지를 불러오지 못했습니다.'}</div>`;
                    return;
                }

                if (reset) {
                    chatMsgs.innerHTML = '';
                    lastMessageId = null;
                }

                if (reset && !result.length) {
                    chatMsgs.innerHTML = '<div class="msg">대화를 시작해보세요.</div>';
                    return;
                }

                result.forEach(appendMessage);
            } finally {
                isLoadingMessages = false;
            }
        }

        function startPolling() {
            if (pollHandle) {
                return;
            }

            pollHandle = window.setInterval(() => {
                syncMessages(false);
            }, 1500);
        }

        function stopPolling() {
            if (!pollHandle) {
                return;
            }

            window.clearInterval(pollHandle);
            pollHandle = null;
        }

        function connectStream() {
            if (stream) {
                stream.close();
            }

            stream = new EventSource(`/api/chat/rooms/${roomId}/stream`);
            stream.onopen = () => {
                stopPolling();
            };
            stream.addEventListener('message', () => {
                void syncMessages(false);
            });

            stream.onerror = () => {
                if (stream) {
                    stream.close();
                    stream = null;
                }
                startPolling();
            };
        }

        async function send() {
            const content = msgInput.value.trim();
            if (!content || isSending) {
                return;
            }

            isSending = true;
            setChatEnabled(false);

            try {
                const response = await fetch(`/api/chat/rooms/${roomId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...csrfHeaders()
                    },
                    body: JSON.stringify({ content })
                });

                const result = await response.json().catch(() => ({}));
                if (!response.ok) {
                    alert(result.message || '메시지 전송 중 오류가 발생했습니다.');
                    return;
                }

                appendMessage(result);
                msgInput.value = '';
            } finally {
                isSending = false;
                setChatEnabled(true);
                msgInput.focus();
            }
        }

        window.send = send;

        (async function init() {
            setChatEnabled(false);

            const canOpen = await loadRoom();
            if (!canOpen) {
                return;
            }

            await syncMessages(true);
            connectStream();
            setChatEnabled(true);
            msgInput.focus();

            window.addEventListener('beforeunload', () => {
                if (pollHandle) {
                    window.clearInterval(pollHandle);
                }
                if (stream) {
                    stream.close();
                }
            });
        })();
    </script>
</body>
</html>
