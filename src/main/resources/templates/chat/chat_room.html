<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>SimuUser Chat</title>
    <link rel="stylesheet" th:href="@{/css/chat/chat_room.css}">
</head>
<body>
    <div class="chat-header" id="chatTitle">채팅</div>
    <div class="chat-messages" id="chatMsgs">
        <div class="msg">메시지를 불러오는 중입니다.</div>
    </div>
    <div class="chat-input-area">
        <div class="plus-menu-container">
            <button id="plusBtn" class="plus-btn" type="button">+</button>
            <div id="plusMenu" class="plus-menu">
                <button type="button" disabled>사진 전송</button>
                <button type="button" disabled>파일 업로드</button>
            </div>
        </div>
        <input type="text" id="msgInput" placeholder="메시지를 입력해주세요." onkeypress="if(event.keyCode==13) send()">
        <button id="sendBtn" onclick="send()" type="button">전송</button>
    </div>

    <script>
        const roomId = window.location.pathname.split('/').pop();
        let chatSocket = null;
        let reconnectHandle = null;
        let lastMessageId = null;

        const plusBtn = document.getElementById('plusBtn');
        const plusMenu = document.getElementById('plusMenu');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        plusBtn.onclick = (e) => {
            e.stopPropagation();
            plusMenu.classList.toggle('active');
        };

        document.addEventListener('click', () => {
            plusMenu.classList.remove('active');
        });

        function formatTime(value) {
            if (!value) return '';
            return new Date(value).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        function setChatEnabled(enabled) {
            msgInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
        }

        function appendMessage(message) {
            if (!message || typeof message.id !== 'number') {
                return;
            }
            if (lastMessageId !== null && message.id <= lastMessageId) {
                return;
            }

            const chatMsgs = document.getElementById('chatMsgs');
            if (chatMsgs.children.length === 1 && chatMsgs.firstElementChild?.textContent?.includes('대화를 시작해보세요.')) {
                chatMsgs.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = message.mine ? 'msg my-msg' : 'msg';
            div.textContent = message.content;
            div.title = formatTime(message.createdAt);
            chatMsgs.appendChild(div);
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
            lastMessageId = message.id;
        }

        async function loadRoom() {
            const response = await fetch(`/api/chat/rooms/${roomId}`);
            const result = await response.json().catch(() => ({}));
            if (!response.ok) {
                document.getElementById('chatTitle').textContent = '채팅';
                document.getElementById('chatMsgs').innerHTML = `<div class="msg">${result.message || '채팅방을 불러올 수 없습니다.'}</div>`;
                setChatEnabled(false);
                return false;
            }

            document.getElementById('chatTitle').textContent = result.name;
            return true;
        }

        async function loadMessages(reset = false) {
            const query = !reset && lastMessageId ? `?afterMessageId=${lastMessageId}` : '';
            const response = await fetch(`/api/chat/rooms/${roomId}/messages${query}`);
            const result = await response.json().catch(() => []);

            if (!response.ok) {
                document.getElementById('chatMsgs').innerHTML = `<div class="msg">${result.message || '메시지를 불러올 수 없습니다.'}</div>`;
                return;
            }

            const chatMsgs = document.getElementById('chatMsgs');
            if (reset) {
                chatMsgs.innerHTML = '';
                lastMessageId = null;
            }

            if (reset && !result.length) {
                chatMsgs.innerHTML = '<div class="msg">대화를 시작해보세요.</div>';
                return;
            }

            result.forEach(appendMessage);
        }

        function websocketUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${protocol}//${window.location.host}/ws/chat?roomId=${roomId}`;
        }

        function scheduleReconnect() {
            if (reconnectHandle) {
                return;
            }
            setChatEnabled(false);
            reconnectHandle = window.setTimeout(() => {
                reconnectHandle = null;
                connectChatSocket();
            }, 2000);
        }

        function connectChatSocket() {
            if (chatSocket && (chatSocket.readyState === WebSocket.OPEN || chatSocket.readyState === WebSocket.CONNECTING)) {
                return;
            }

            chatSocket = new WebSocket(websocketUrl());

            chatSocket.addEventListener('open', async () => {
                setChatEnabled(true);
                if (lastMessageId !== null) {
                    await loadMessages(false);
                }
            });

            chatSocket.addEventListener('message', (event) => {
                const payload = JSON.parse(event.data);
                if (payload.error) {
                    alert(payload.error);
                    return;
                }
                appendMessage(payload);
            });

            chatSocket.addEventListener('close', () => {
                scheduleReconnect();
            });

            chatSocket.addEventListener('error', () => {
                if (chatSocket && chatSocket.readyState !== WebSocket.CLOSED) {
                    chatSocket.close();
                }
            });
        }

        function send() {
            const content = msgInput.value.trim();
            if (!content) {
                return;
            }

            if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) {
                alert('채팅 서버에 다시 연결 중입니다.');
                return;
            }

            chatSocket.send(JSON.stringify({ content }));
            msgInput.value = '';
        }

        window.send = send;

        (async function init() {
            setChatEnabled(false);
            const canOpen = await loadRoom();
            if (!canOpen) {
                return;
            }

            await loadMessages(true);
            connectChatSocket();

            window.addEventListener('beforeunload', () => {
                if (reconnectHandle) {
                    window.clearTimeout(reconnectHandle);
                }
                if (chatSocket) {
                    chatSocket.close();
                }
            });
        })();
    </script>
</body>
</html>
