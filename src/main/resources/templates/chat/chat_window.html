<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf}" th:content="${_csrf.headerName}">
    <title>SimuUser Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #ffffff; height: 100vh; display: flex; flex-direction: column; }

        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }

        .request-bar {
            background: #f8fafc;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            display: none;
        }

        .request-bar.active { display: flex; }
        .request-text { font-size: 13px; color: #3b82f6; font-weight: bold; }
        .request-count { background: #ef4444; color: white; border-radius: 10px; padding: 2px 8px; font-size: 11px; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            width: 300px;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btns button { padding: 8px 15px; border-radius: 6px; cursor: pointer; border: none; }
        .btn-cancel { background: #e2e8f0; }
        .btn-start { background: #3b82f6; color: white; }

        .filter-tabs {
            display: flex;
            gap: 10px;
            padding: 0 15px 10px;
            border-bottom: 1px solid #f1f5f9;
            margin-top: 10px;
        }

        .tab-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            color: #64748b;
        }

        .tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

        .chat-list { flex: 1; overflow-y: auto; }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover { background: #f8fafc; }

        .profile-img {
            width: 45px;
            height: 45px;
            background: #e2e8f0;
            border-radius: 15px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #475569;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info { flex: 1; border-bottom: 1px solid #f8fafc; padding-bottom: 5px; min-width: 0; }
        .chat-name-row { display: flex; justify-content: space-between; margin-bottom: 4px; gap: 8px; }
        .chat-name { font-size: 14px; font-weight: bold; color: #1e293b; }
        .chat-time { font-size: 11px; color: #94a3b8; white-space: nowrap; }
        .chat-last-msg { font-size: 13px; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .empty-state { padding: 40px; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header-top">
        <h2>채팅</h2>
        <div class="header-actions">
            <button id="newChatButton" type="button" style="background:none; border:none; cursor:pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <div id="requestBar" class="request-bar">
        <span class="request-text">메시지 요청</span>
        <span id="requestCount" class="request-count">0</span>
    </div>

    <div class="filter-tabs">
        <button class="tab-btn active" data-filter="ALL">전체</button>
        <button class="tab-btn" data-filter="PRIVATE">개인채팅</button>
        <button class="tab-btn" data-filter="TEAM">팀채팅</button>
    </div>

    <div id="newChatModal" class="modal">
        <div class="modal-content">
            <h3 style="font-size: 16px;">새 채팅 시작</h3>
            <input type="email" id="targetEmail" placeholder="상대방 이메일 주소 입력">
            <div class="modal-btns">
                <button class="btn-cancel" id="cancelNewChat" type="button">취소</button>
                <button class="btn-start" id="submitNewChat" type="button">시작</button>
            </div>
        </div>
    </div>

    <div id="chatList" class="chat-list"></div>

    <div id="requestModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <div class="profile-img" id="modalProfile" style="margin: 0 auto 15px; width: 60px; height: 60px; font-size: 20px;">?</div>
            <h3 id="modalName" style="font-size: 16px; margin-bottom: 8px;">메시지 요청</h3>
            <p id="modalRequestMessage" style="font-size: 13px; color: #64748b; margin-bottom: 20px;">메시지 요청을 수락하시겠습니까?</p>

            <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                <button class="btn-start" id="acceptRequestButton" type="button" style="width: 100%; padding: 12px;">수락</button>
                <button class="btn-cancel" id="declineRequestButton" type="button" style="width: 100%; padding: 12px; background: none; color: #ef4444;">거절</button>
            </div>
        </div>
    </div>

    <script>
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        let chatRooms = [];
        let messageRequests = [];
        let currentFilter = 'ALL';
        let selectedRequest = null;

        function csrfHeaders() {
            return csrfToken && csrfHeader ? { [csrfHeader]: csrfToken } : {};
        }

        function formatRelativeTime(value) {
            if (!value) return '방금 전';
            const diffMs = Date.now() - new Date(value).getTime();
            const minutes = Math.max(0, Math.floor(diffMs / 60000));
            if (minutes < 1) return '방금 전';
            if (minutes < 60) return `${minutes}분 전`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}시간 전`;
            return `${Math.floor(hours / 24)}일 전`;
        }

        function profileHtml(profileImage, name) {
            if (profileImage) {
                return `<div class="profile-img"><img src="${profileImage}" alt=""></div>`;
            }
            return `<div class="profile-img">${(name || '?').trim().slice(0, 2).toUpperCase()}</div>`;
        }

        function renderList(filterType = 'ALL') {
            const listContainer = document.getElementById('chatList');
            const filtered = filterType === 'ALL'
                ? chatRooms
                : chatRooms.filter(room => room.type === filterType);

            if (!filtered.length) {
                listContainer.innerHTML = '<p class="empty-state">채팅방이 없습니다.</p>';
                return;
            }

            listContainer.innerHTML = filtered.map(room => `
                <div class="chat-item" data-room-id="${room.id}">
                    ${profileHtml(room.profileImage, room.name)}
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <span class="chat-name">${room.name}</span>
                            <span class="chat-time">${formatRelativeTime(room.lastMessageAt)}</span>
                        </div>
                        <div class="chat-last-msg">${room.lastMessage || '대화를 시작해보세요.'}</div>
                    </div>
                </div>
            `).join('');

            listContainer.querySelectorAll('[data-room-id]').forEach(item => {
                item.addEventListener('click', () => openDetail(item.dataset.roomId));
            });
        }

        function updateRequestBadge() {
            const bar = document.getElementById('requestBar');
            const count = document.getElementById('requestCount');

            if (messageRequests.length > 0) {
                bar.classList.add('active');
                count.textContent = messageRequests.length;
            } else {
                bar.classList.remove('active');
            }
        }

        function openDetail(roomId) {
            const width = 360;
            const height = 550;
            const left = (window.screen.width / 2) - (width / 2);
            const top = (window.screen.height / 2) - (height / 2);
            const windowFeatures = `width=${width},height=${height},left=${left},top=${top},resizable=yes`;
            window.open(`/chat/room/${roomId}`, `room_${roomId}`, windowFeatures);
        }

        async function loadRooms() {
            const response = await fetch('/api/chat/rooms');
            chatRooms = response.ok ? await response.json() : [];
            renderList(currentFilter);
        }

        async function loadRequests() {
            const response = await fetch('/api/chat/requests');
            messageRequests = response.ok ? await response.json() : [];
            updateRequestBadge();
        }

        async function refreshData() {
            await Promise.all([loadRooms(), loadRequests()]);
        }

        function openNewChatModal() {
            document.getElementById('newChatModal').classList.add('active');
        }

        function closeNewChatModal() {
            document.getElementById('newChatModal').classList.remove('active');
            document.getElementById('targetEmail').value = '';
        }

        async function startNewChat() {
            const email = document.getElementById('targetEmail').value.trim();
            if (!email) {
                alert('이메일을 입력해주세요.');
                return;
            }

            const response = await fetch('/api/chat/private-requests', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...csrfHeaders()
                },
                body: JSON.stringify({ email })
            });

            const result = await response.json().catch(() => ({}));
            if (!response.ok) {
                alert(result.message || '채팅 요청에 실패했습니다.');
                return;
            }

            closeNewChatModal();
            await refreshData();
        }

        function openRequestModal(req) {
            selectedRequest = req;
            document.getElementById('modalName').innerText = req.requesterName;
            document.getElementById('modalProfile').innerHTML = req.requesterProfileImage
                ? `<img src="${req.requesterProfileImage}" alt="" style="width:100%; height:100%; object-fit:cover;">`
                : (req.requesterName || '?').trim().slice(0, 2).toUpperCase();
            document.getElementById('modalRequestMessage').innerText = req.message || '메시지 요청을 수락하시겠습니까?';
            document.getElementById('requestModal').classList.add('active');
        }

        function closeRequestModal() {
            document.getElementById('requestModal').classList.remove('active');
            selectedRequest = null;
        }

        async function acceptRequest() {
            if (!selectedRequest) return;

            const response = await fetch(`/api/chat/requests/${selectedRequest.roomId}/accept`, {
                method: 'POST',
                headers: csrfHeaders()
            });

            const result = await response.json().catch(() => ({}));
            if (!response.ok) {
                alert(result.message || '요청 수락에 실패했습니다.');
                return;
            }

            closeRequestModal();
            await refreshData();
            openDetail(result.id);
        }

        async function declineRequest() {
            if (!selectedRequest) return;

            const response = await fetch(`/api/chat/requests/${selectedRequest.roomId}/decline`, {
                method: 'POST',
                headers: csrfHeaders()
            });

            if (!response.ok) {
                const result = await response.json().catch(() => ({}));
                alert(result.message || '요청 거절에 실패했습니다.');
                return;
            }

            closeRequestModal();
            await refreshData();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(button => button.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderList(currentFilter);
            });
        });

        document.getElementById('newChatButton').addEventListener('click', openNewChatModal);
        document.getElementById('cancelNewChat').addEventListener('click', closeNewChatModal);
        document.getElementById('submitNewChat').addEventListener('click', startNewChat);
        document.getElementById('requestBar').addEventListener('click', () => {
            if (messageRequests.length > 0) {
                openRequestModal(messageRequests[0]);
            }
        });
        document.getElementById('acceptRequestButton').addEventListener('click', acceptRequest);
        document.getElementById('declineRequestButton').addEventListener('click', declineRequest);

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', event => {
                if (event.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        refreshData();
    </script>
</body>
</html>
