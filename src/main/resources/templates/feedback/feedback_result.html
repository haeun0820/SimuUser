<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기획 & 피드백 AI - SimuUser</title>
  <link rel="stylesheet" th:href="@{/css/feedback/feedback_result.css}">
  <link rel="stylesheet" th:href="@{/css/header/header.css}">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar-aside-wrapper" style="width: 240px; flex-shrink: 0;">
    <div id="sidebar-root" data-active="feedback"></div>
  </aside>

  <div class="main-area">
    <header th:replace="~{header/header :: header(${ {'분석도구','기획 & 피드백 AI'} })}"></header>

    <main class="page-content">
      <div class="tool-page-header">
        <div class="tool-icon-wrap" style="background-color: #4F46E5;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div>
          <h1 class="tool-title">기획 & 피드백 AI</h1>
          <p class="tool-subtitle">기획서를 분석하여 논리 구조, 완성도, 실행 가능성, 리스크를 평가합니다.</p>
        </div>
      </div>

      <div class="score-container">
        <div class="score-card">
          <span class="score-label">종합 점수</span>
          <span class="score-value" th:text="${result.totalScore}">0</span>
          <div class="progress-bar"><div class="progress-fill" th:style="'width: ' + ${result.totalScore} + '%;'"></div></div>
        </div>
        <div class="score-card">
          <span class="score-label">논리 구조</span>
          <span class="score-value" th:text="${result.logicScore}">0</span>
          <div class="progress-bar"><div class="progress-fill" th:style="'width: ' + ${result.logicScore} + '%;'"></div></div>
        </div>
        <div class="score-card">
          <span class="score-label">완성도</span>
          <span class="score-value" th:text="${result.completionScore}">0</span>
          <div class="progress-bar"><div class="progress-fill" th:style="'width: ' + ${result.completionScore} + '%;'"></div></div>
        </div>
        <div class="score-card">
          <span class="score-label">실현 가능성</span>
          <span class="score-value" th:text="${result.feasibilityScore}">0</span>
          <div class="progress-bar"><div class="progress-fill" th:style="'width: ' + ${result.feasibilityScore} + '%;'"></div></div>
        </div>
      </div>

      <div class="analysis-grid">
        <div class="analysis-card strength">
          <h3><span class="icon">◎</span> 강점</h3>
          <ul>
            <li th:each="str : ${result.strengths}" th:text="${str}"></li>
            <li th:if="${#lists.isEmpty(result.strengths)}">분석된 강점이 없습니다.</li>
          </ul>
        </div>
        <div class="analysis-card weakness">
          <h3><span class="icon">⊗</span> 약점</h3>
          <ul>
            <li th:each="weak : ${result.weaknesses}" th:text="${weak}"></li>
          </ul>
        </div>
      </div>

      <div class="section-card">
        <h3>△ 부족한 요소</h3>
        <div class="tag-container">
          <span class="tag" th:each="tag : ${result.missingElements}" th:text="${tag}">부족한 요소</span>
          <span class="tag" th:if="${#lists.isEmpty(result.missingElements)}">추가 분석 필요</span>
        </div>
      </div>

      <div class="section-card">
        <h3>💡 개선 방향</h3>
        <ol class="improvement-list">
          <li th:each="item : ${result.improvements}" th:text="${item}"></li>
        </ol>
      </div>

      <div class="section-card">
        <h3>○ 리스크 분석</h3>
        <div class="empty-row" th:each="risk : ${result.risks}" th:text="${risk}"></div>
        <div class="empty-row" th:if="${#lists.isEmpty(result.risks)}">분석된 리스크가 없습니다.</div>
      </div>

      <div class="section-card">
        <h3>△ 실패 시나리오</h3>
        <div class="scenario-box"><strong>최상:</strong> <span class="desc" th:text="${result.scenarios.best}">대응 방안</span></div>
        <div class="scenario-box"><strong>보통:</strong> <span class="desc" th:text="${result.scenarios.normal}">대응 방안</span></div>
        <div class="scenario-box"><strong>최악:</strong> <span class="desc" th:text="${result.scenarios.worst}">대응 방안</span></div>
      </div>
    </main>
  </div>
</div>

<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/header.js}"></script>
<script th:src="@{/js/feedback/feedback_result.js}"></script>
</body>
</html>
